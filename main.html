<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>王牌竞速 · 情报站 | 视觉升级版</title>
    <style>
        /* ========== 基础样式保持不变 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        input, textarea {
            user-select: text;
            caret-color: auto;
        }
        
        body { 
            background: #0a0a0f; 
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif; 
        }
        
        /* ========== 电脑端高级视觉增强 ========== */
        @media (min-width: 769px) {
            /* 深邃星空渐变背景 */
            body {
                background: radial-gradient(ellipse at 20% 30%, #0f0f1a 0%, #06060a 100%);
                background-attachment: fixed;
            }
            
            /* 精致网格纹理 - 更高级的科技感 */
            body::before {
                content: '';
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-image: 
                    linear-gradient(rgba(254, 202, 87, 0.06) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(254, 202, 87, 0.06) 1px, transparent 1px);
                background-size: 35px 35px;
                pointer-events: none;
                z-index: -1;
            }
            
            /* 微光晕效果 */
            body::after {
                content: '';
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: radial-gradient(circle at 50% 20%, rgba(254, 202, 87, 0.08), transparent 60%);
                pointer-events: none;
                z-index: -1;
            }
            
            /* 左侧导航栏 - 高级毛玻璃 + 金色边框 */
            .sidebar {
                background: rgba(8, 8, 14, 0.6);
                backdrop-filter: blur(20px);
                border-right: 1px solid rgba(254, 202, 87, 0.25);
                box-shadow: 4px 0 30px rgba(0, 0, 0, 0.3);
            }
            .sidebar .logo-area {
                border-bottom: 1px solid rgba(254, 202, 87, 0.3);
            }
            .sidebar .logo-area h1 {
                background: linear-gradient(135deg, #ffd89b, #feca57, #ff8c5a);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                text-shadow: 0 0 20px rgba(254, 202, 87, 0.2);
            }
            .tab-btn {
                transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
                letter-spacing: 0.5px;
                position: relative;
            }
            .tab-btn.active {
                background: rgba(254, 202, 87, 0.12);
                color: #feca57;
                border-left: 3px solid #feca57;
                border-radius: 0 12px 12px 0;
                box-shadow: -4px 0 15px rgba(254, 202, 87, 0.1);
            }
            .tab-btn:hover:not(.active) {
                background: rgba(255, 255, 255, 0.06);
                color: #feca57;
                transform: translateX(4px);
            }
            
            /* 电脑端固定顶部导航栏 - 完全透明毛玻璃，滚动穿透效果 */
            .desktop-header {
                position: sticky;
                top: 0;
                z-index: 100;
                background: rgba(8, 8, 16, 0.45);
                backdrop-filter: blur(16px);
                border-bottom: 1px solid rgba(254, 202, 87, 0.2);
                border-radius: 0;
                margin-bottom: 20px;
                padding: 0;
                transition: all 0.3s ease;
            }
            /* 滚动时的增强效果 */
            .desktop-header.scrolled {
                background: rgba(8, 8, 16, 0.65);
                backdrop-filter: blur(20px);
                border-bottom-color: rgba(254, 202, 87, 0.35);
            }
            .desktop-header-top {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 12px 0 10px 0;
            }
            .page-title {
                font-size: 1.1rem;
                font-weight: 700;
                letter-spacing: 1.5px;
                background: linear-gradient(135deg, #fff8e7, #feca57);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                text-shadow: 0 0 10px rgba(254, 202, 87, 0.2);
            }
            .detail-back-btn-header {
                background: rgba(31, 31, 46, 0.7);
                backdrop-filter: blur(8px);
                border: 1px solid rgba(254, 202, 87, 0.4);
                padding: 6px 18px;
                border-radius: 40px;
                transition: all 0.25s;
                font-weight: 600;
            }
            .detail-back-btn-header:hover {
                background: #feca57;
                color: #1a1a2e;
                border-color: #feca57;
                transform: scale(1.02);
                box-shadow: 0 0 16px rgba(254, 202, 87, 0.4);
            }
            
            .desktop-filter-bar {
                background: rgba(20, 20, 31, 0.45);
                backdrop-filter: blur(16px);
                border: 1px solid rgba(254, 202, 87, 0.18);
                border-radius: 28px;
                box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
                transition: all 0.3s;
            }
            .search-box input {
                border: 1px solid rgba(254, 202, 87, 0.3);
                background: rgba(31, 31, 46, 0.6);
                backdrop-filter: blur(4px);
                transition: all 0.25s;
                border-radius: 44px;
            }
            .search-box input:focus {
                border-color: #feca57;
                box-shadow: 0 0 14px rgba(254, 202, 87, 0.25);
                background: rgba(31, 31, 46, 0.85);
            }
            
            .desktop-filter-option, .desktop-quality-option {
                background: rgba(42, 42, 60, 0.55);
                backdrop-filter: blur(4px);
                border: 1px solid rgba(255, 255, 255, 0.06);
                transition: all 0.2s;
                border-radius: 32px;
            }
            .desktop-filter-option.active, .desktop-quality-option.active {
                background: #feca57;
                color: #1a1a2e;
                border-color: #feca57;
                box-shadow: 0 2px 12px rgba(254, 202, 87, 0.3);
            }
            
            /* 车辆卡片 - 更高级的玻璃质感 + 上移布局 */
            .cars-grid { 
                display: grid; 
                grid-template-columns: repeat(3, 1fr); 
                gap: 28px; 
                margin-top: 0;
                padding-top: 0;
            }
            .car-card {
                background: rgba(18, 18, 28, 0.7);
                backdrop-filter: blur(12px);
                border: 1px solid rgba(254, 202, 87, 0.2);
                border-radius: 32px;
                transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
                box-shadow: 0 12px 28px rgba(0, 0, 0, 0.25);
                transform: translateY(0);
            }
            .car-card:hover {
                transform: translateY(-8px);
                border-color: rgba(254, 202, 87, 0.6);
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(254, 202, 87, 0.2);
            }
            .card-info {
                background: rgba(18, 18, 28, 0.55);
                backdrop-filter: blur(4px);
                border-top: 1px solid rgba(255, 255, 255, 0.05);
            }
            
            /* 卡片图片区域微调 */
            .card-image {
                height: 180px;
                padding: 20px;
            }
            
            /* 详情页容器高级玻璃效果 */
            .detail-container {
                background: rgba(16, 16, 24, 0.7);
                backdrop-filter: blur(24px);
                border: 1px solid rgba(254, 202, 87, 0.25);
                border-radius: 36px;
                box-shadow: 0 25px 45px rgba(0, 0, 0, 0.35);
            }
            .detail-info-panel {
                background: rgba(12, 12, 20, 0.55);
                backdrop-filter: blur(16px);
                border: 1px solid rgba(255, 255, 255, 0.06);
                border-radius: 28px;
            }
            .feature-box {
                background: rgba(30, 30, 50, 0.65);
                backdrop-filter: blur(4px);
                border: 1px solid rgba(254, 202, 87, 0.2);
                transition: all 0.2s;
            }
            .feature-box:hover {
                background: rgba(254, 202, 87, 0.15);
                transform: translateY(-2px);
            }
            .skill-desc, .sub-skill, .stat-card, .info-row {
                background: rgba(0, 0, 0, 0.3);
                backdrop-filter: blur(4px);
                border: 1px solid rgba(255, 255, 255, 0.05);
            }
            
            /* 滚动条美化 */
            ::-webkit-scrollbar {
                width: 6px;
                height: 6px;
            }
            ::-webkit-scrollbar-track {
                background: rgba(20, 20, 31, 0.5);
                border-radius: 10px;
            }
            ::-webkit-scrollbar-thumb {
                background: rgba(254, 202, 87, 0.4);
                border-radius: 10px;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: rgba(254, 202, 87, 0.7);
            }
        }
        
        /* 左侧固定导航布局（电脑端） */
        .app-layout { display: flex; max-width: 1600px; margin: 0 auto; min-height: 100vh; position: relative; z-index: 1; }
        .sidebar { width: 240px; background: #0f0f17; border-right: 1px solid #2a2a3c; padding: 24px 0; position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; z-index: 100; }
        .sidebar .logo-area { padding: 0 16px 20px 16px; border-bottom: 1px solid #2a2a3c; margin-bottom: 20px; cursor: pointer; }
        .sidebar .logo-area h1 { font-size: 1.2rem; background: linear-gradient(135deg, #ff6b6b, #feca57); -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: 800; }
        .sidebar .logo-area p { font-size: 0.6rem; color: #8a8aa3; margin-top: 4px; font-weight: 500; }
        .nav-tabs { display: flex; flex-direction: column; gap: 6px; padding: 0 12px; width: 100%; }
        .tab-btn { padding: 12px 16px; border: none; background: transparent; border-radius: 12px; font-size: 0.9rem; cursor: pointer; color: #a0a0b8; transition: 0.2s; text-align: left; font-weight: 700; width: 100%; }
        .tab-btn.active { background: #2a2a3c; color: #feca57; }
        .tab-btn:hover:not(.active) { background: #1f1f2e; color: #e2e2e6; }
        
        .main-content { flex: 1; margin-left: 240px; padding: 0 24px 60px 24px; width: calc(100% - 240px); }
        .page { display: none; }
        .page.active-page { display: block; }
        
        /* 桌面端其余基础样式保留结构 */
        .desktop-header { position: sticky; top: 0; z-index: 100; background: #0f0f17; padding: 4px 0 0 0; border-bottom: 1px solid #2a2a3c; margin-bottom: 24px; }
        .desktop-header-top { display: flex; align-items: center; justify-content: space-between; padding: 0 0 6px 0; }
        .header-title-area { display: flex; align-items: center; gap: 16px; }
        .page-title { font-size: 1rem; font-weight: 700; color: #e2e2e6; letter-spacing: 0.5px; background: linear-gradient(135deg, #ff6b6b, #feca57); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .detail-back-btn-header { display: inline-block; background: #1f1f2e; border: none; padding: 4px 14px; border-radius: 40px; cursor: pointer; color: #feca57; font-size: 0.75rem; font-weight: 700; transition: 0.2s; }
        .detail-back-btn-header:hover { background: #feca57; color: #1a1a2e; transform: scale(1.02); }
        .header-right-placeholder { width: 80px; }
        .desktop-filter-bar { background: #14141f; border-radius: 20px; padding: 16px 20px; backdrop-filter: blur(8px); border: 1px solid #2a2a3c; margin-bottom: 0; }
        .search-box { margin-bottom: 16px; }
        .search-box input { width: 100%; max-width: 400px; padding: 10px 16px; border-radius: 40px; border: 1px solid #2a2a3c; background: #1f1f2e; color: #e2e2e6; font-size: 0.9rem; font-weight: 500; outline: none; }
        .search-box input:focus { border-color: #feca57; }
        .desktop-filter-sections { display: flex; flex-wrap: wrap; gap: 24px; }
        .desktop-filter-section { display: flex; flex-direction: column; gap: 8px; }
        .desktop-filter-section-title { font-size: 0.75rem; color: #feca57; font-weight: 700; letter-spacing: 0.5px; }
        .desktop-filter-options { display: flex; flex-wrap: wrap; gap: 10px; }
        .desktop-filter-option { background: #2a2a3c; border-radius: 30px; padding: 6px 14px; font-size: 0.75rem; cursor: pointer; color: #a0a0b8; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; font-weight: 600; }
        .desktop-filter-option.active { background: #feca57; color: #1a1a2e; }
        .desktop-filter-option img { width: 16px; height: 16px; }
        .desktop-quality-option { background: #2a2a3c; border-radius: 30px; padding: 6px 14px; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; white-space: nowrap; color: #a0a0b8; }
        .desktop-quality-option.active { background: #feca57; color: #1a1a2e; }
        
        .cars-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
        .car-card { background: #14141f; border-radius: 24px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; position: relative; display: flex; flex-direction: column; }
        .car-card:hover { transform: translateY(-4px); }
        
        .card-image { height: 180px; display: flex; align-items: center; justify-content: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); position: relative; overflow: hidden; flex-shrink: 0; }
        .card-image.legendary { background: linear-gradient(145deg, #1a1208 0%, #0d0a05 100%); }
        .card-image.epic { background: linear-gradient(145deg, #1a0f1a 0%, #0d050d 100%); }
        .card-image.rare { background: linear-gradient(145deg, #0e1a2a 0%, #060d15 100%); }
        .card-image.normal { background: linear-gradient(145deg, #1a2a1a 0%, #0a1a0a 100%); }
        .card-image img { max-width: 100%; max-height: 100%; object-fit: contain; position: relative; z-index: 2; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4)); }
        
        .acquisition-icon { position: absolute; bottom: 12px; right: 12px; width: 64px; height: 64px; cursor: pointer; z-index: 10; transition: transform 0.2s; background: transparent; border-radius: 0; }
        .quality-badge-wrapper { position: absolute; bottom: 12px; right: 12px; z-index: 15; }
        .quality-badge { font-size: 0.7rem; padding: 3px 12px; border-radius: 30px; font-weight: 800; letter-spacing: 1px; backdrop-filter: blur(2px); text-transform: uppercase; border-width: 1px; border-style: solid; display: inline-block; white-space: nowrap; }
        .quality-badge.legendary { background: linear-gradient(135deg, #e6b422, #c49b1a); color: #ffffff; border-color: #ffd966; box-shadow: 0 2px 12px rgba(230,180,34,0.4); }
        .quality-badge.epic { background: linear-gradient(135deg, #aa6dc9, #8b5aaf); color: #ffffff; border-color: #c99eff; box-shadow: 0 2px 12px rgba(170,109,201,0.4); }
        .quality-badge.rare { background: linear-gradient(135deg, #4a9eff, #2d7fd1); color: #ffffff; border-color: #8bcbff; box-shadow: 0 2px 12px rgba(74,158,255,0.35); }
        .quality-badge.normal { background: linear-gradient(135deg, #40c468, #2f9e52); color: #ffffff; border-color: #8fdfaa; box-shadow: 0 2px 12px rgba(64,196,104,0.3); }
        .card-info { padding: 16px; background: rgba(20,20,31,0.9); }
        .car-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; flex-wrap: wrap; }
        .car-name { font-size: 1.1rem; font-weight: 700; color: #e2e2e6; word-break: break-word; }
        .car-meta { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
        .meta-item { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.08); padding: 4px 10px; border-radius: 40px; font-size: 0.7rem; color: #a0a0b8; font-weight: 500; }
        .meta-item img { width: 18px; height: 18px; }
        .car-description { font-size: 0.75rem; color: #8a8aa3; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 10px; line-height: 1.4; font-weight: 400; }
        .stats-text { text-align: center; padding: 16px; color: #8a8aa3; font-weight: 500; }
        
        /* 详情页样式保留原有结构 */
        .detail-container { background: #14141f; border-radius: 24px; border: 1px solid #2a2a3c; margin-bottom: 24px; }
        .detail-header { display: flex; gap: 30px; padding: 20px 40px; flex-wrap: wrap; }
        .detail-image { flex: 2; min-width: 280px; border-radius: 24px; display: flex; align-items: center; justify-content: center; padding: 50px 40px; border: 1px solid rgba(255,255,255,0.08); position: relative; overflow: hidden; }
        .detail-info-panel { flex: 1; background: rgba(15,15,26,0.8); backdrop-filter: blur(10px); border-radius: 24px; padding: 20px; }
        .detail-name { font-size: 1.7rem; font-weight: 800; color: #e2e2e6; margin-bottom: 16px; }
        .features-section, .chip-slots, .vehicle-stats, .skills-section { padding: 20px 40px; border-top: 1px solid rgba(255,255,255,0.08); }
        .section-title { font-size: 1.65rem; font-weight: 800; color: #e2e2e6; margin-bottom: 20px; padding-left: 12px; border-left: 4px solid #feca57; }
        .features-horizontal { display: flex; flex-wrap: wrap; gap: 16px; }
        .feature-box { background: rgba(30,30,50,0.9); border-radius: 40px; padding: 10px 24px; cursor: pointer; font-weight: 600; font-size: 0.85rem; white-space: nowrap; transition: 0.2s; }
        .chip-icons { display: flex; gap: 12px; flex-wrap: wrap; }
        .chip-icon { width: 56px; height: 56px; background: rgba(0,0,0,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .stat-card { background: rgba(0,0,0,0.3); padding: 12px 16px; border-radius: 16px; display: flex; justify-content: space-between; }
        .skill-block { margin-bottom: 24px; }
        .skill-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .skill-icon { width: 56px; height: 56px; background: rgba(0,0,0,0.4); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .term-highlight { color: #feca57 !important; cursor: pointer; border-bottom: 1px dashed #feca57; }
        
        /* ========== 手机端专用样式（完全保持不变） ========== */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .mobile-fixed-header {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                background: #0f0f17;
                border-bottom: 1px solid #2a2a3c;
                z-index: 200;
                display: flex;
                flex-direction: column;
            }
            .mobile-top-bar { padding: 8px 12px; border-bottom: 1px solid #2a2a3c; }
            .mobile-logo-area { text-align: center; cursor: pointer; padding-bottom: 2px; }
            .mobile-logo-area h1 { font-size: 1rem; background: linear-gradient(135deg, #ff6b6b, #feca57); -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: 800; }
            .mobile-logo-area p { font-size: 0.5rem; color: #8a8aa3; font-weight: 500; }
            .mobile-nav-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-top: 4px; }
            .mobile-tab-btn { padding: 6px 2px; font-size: 0.65rem; border-radius: 16px; text-align: center; background: #1a1a2a; border: none; cursor: pointer; color: #a0a0b8; font-weight: 700; }
            .mobile-tab-btn.active { background: #feca57; color: #1a1a2e; }
            .mobile-filter-sticky { padding: 8px 12px; background: #0a0a0f; border-bottom: 1px solid #2a2a3c; }
            .filter-row { display: flex; gap: 8px; align-items: center; }
            .search-box { flex: 2; margin-bottom: 0; width: auto; }
            .search-box input { width: 100%; padding: 8px 12px; font-size: 0.8rem; background: #1f1f2e; border-radius: 30px; color: #e2e2e6; outline: none; }
            .category-dropdown-btn { background: #1f1f2e; border-radius: 30px; padding: 6px 14px; font-size: 0.75rem; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
            .category-dropdown-panel { background: #1a1a2a; border-radius: 16px; margin-top: 8px; padding: 10px; border: 1px solid #2a2a3c; display: none; position: absolute; left: 12px; right: 12px; z-index: 210; }
            .category-dropdown-panel.show { display: block; }
            .filter-section { margin-bottom: 12px; }
            .filter-section-title { font-size: 0.65rem; color: #feca57; margin-bottom: 5px; font-weight: 700; }
            .filter-options { display: flex; flex-wrap: wrap; gap: 8px; }
            .filter-option, .quality-option { background: #2a2a3c; border-radius: 30px; padding: 6px 12px; font-size: 0.7rem; cursor: pointer; color: #a0a0b8; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; font-weight: 600; }
            .filter-option.active, .quality-option.active { background: #feca57; color: #1a1a2e; }
            .main-content { margin-left: 0; margin-top: 0; padding: 12px; width: 100%; }
            body.has-fixed-header .main-content { margin-top: 145px; }
            .cars-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .card-image { height: 130px; padding: 12px; }
            .car-name { font-size: 0.85rem; }
            .quality-badge-wrapper { position: absolute; top: 8px; right: 8px; bottom: auto; left: auto; }
            .quality-badge { font-size: 0.5rem; padding: 2px 6px; }
            .acquisition-icon { width: 40px; height: 40px; bottom: 6px; right: 6px; }
            .meta-item { font-size: 0.55rem; padding: 2px 6px; }
            .car-description { font-size: 0.6rem; }
            .car-card { border: none; }
            .features-horizontal { gap: 8px; }
            .feature-box { font-size: 0.75rem; padding: 6px 12px; white-space: nowrap; }
            .chip-icons { flex-wrap: nowrap; overflow-x: auto; gap: 8px; }
            .chip-icon { width: 44px; height: 44px; flex-shrink: 0; }
            .detail-container { overflow-x: hidden; padding-bottom: 20px; }
            .detail-header { flex-direction: column; padding: 16px !important; gap: 16px !important; }

<script>
    // ==================== 全局变量 ====================
    let vehiclesData = [], termDefinitions = {};
    let activeFilters = { position: "", specialty: "", quality: "" };
    let keyword = "", activeTooltipTimer = null, currentTooltipElement = null, searchDebounceTimer = null;
    const EXTRA_RACING_ICON_CARS = ["女武神"];
    const RACING_ICON_URL = "https://s3.bmp.ovh/2026/05/31/7k3ksZ5K.png";
    const qualityWeight = { "传说": 4, "史诗": 3, "稀有": 2, "普通": 1 };
    const positionWeight = { "竞速": 3, "辅助": 2, "干扰": 1, "天平": 2 };
    const qualityOverrides = { "mini jcw": "稀有", "风神": "传说", "幻蝶": "传说" };
    const CHIP_ICONS = { circle: "https://s3.bmp.ovh/2026/05/31/OnUTepDT.png", triangle: "https://s3.bmp.ovh/2026/05/31/J5FiGMmt.png", rhombus: "https://s3.bmp.ovh/2026/05/31/pw68CH6t.png", hexagon: "https://s3.bmp.ovh/2026/05/31/2vWKj9Ev.png", vslot: "https://s3.bmp.ovh/2026/05/31/Guvt6llt.png" };
    const POSITION_ICONS = { "辅助": "https://s3.bmp.ovh/2026/05/31/mtc05q5R.png", "竞速": "https://s3.bmp.ovh/2026/05/31/7k3ksZ5K.png", "干扰": "https://s3.bmp.ovh/2026/05/31/yoQTZbOL.png", "天平": "https://s3.bmp.ovh/2026/05/31/S38JRfCL.png" };
    const SPECIALTY_ICONS = { "城市": "https://s3.bmp.ovh/2026/05/31/nNwRnfQf.png", "山路": "https://s3.bmp.ovh/2026/05/31/2y6MiwXC.png", "场地": "https://s3.bmp.ovh/2026/05/31/qGyMY5a6.png" };
    
    // ========== 辅助函数 (与原来完全一致，保持功能) ==========
    function sortChipSlots(slots) { const order = { "circle": 0, "triangle": 1, "rhombus": 2, "hexagon": 3, "vslot": 4 }; return [...slots].sort((a,b)=> (order[a]??5)-(order[b]??5)); }
    function getQualityClass(q) { if(q==="传说") return "legendary"; if(q==="史诗") return "epic"; if(q==="稀有") return "rare"; return "normal"; }
    function getBorderClass(q) { if(q==="传说") return "legendary-border"; if(q==="史诗") return "epic-border"; if(q==="稀有") return "rare-border"; return "normal-border"; }
    function getCorrectedQuality(name, q) { const low = name.toLowerCase(); for(let [k,v] of Object.entries(qualityOverrides)) if(low.includes(k.toLowerCase())) return v; return q; }
    function sortVehicles(arr) { return [...arr].sort((a,b)=> new Date(b.registerDate)-new Date(a.registerDate) || qualityWeight[b.quality]-qualityWeight[a.quality] || positionWeight[b.position]-positionWeight[a.position]); }
    function applyNumberHighlight(text) { if(!text) return text; return text.replace(/(\d+(?:\.\d+)?%)/g,'<span class="red-number">$1</span>').replace(/(\d+(?:\.\d+)?)(?![^<]*>)(?![^<]*<\/span>)/g,'<span class="red-number">$1</span>').replace(/<span class="red-number"><span class="red-number">(.*?)<\/span><\/span>/g,'<span class="red-number">$1</span>'); }
    function highlightTerms(text) { if(!text) return text; let r = text; for(let t of Object.keys(termDefinitions)) r = r.replace(new RegExp(`(${t})`,'g'),`<span class="term-highlight" data-term="${t}">${t}</span>`); return r; }
    function formatSkillText(text) { if(!text) return text; let r = highlightTerms(text); r = r.replace(/([：:；;])\s*/g,'$1\n').replace(/\n{2,}/g,'\n'); let sentences=[], cur=''; for(let i=0;i<r.length;i++){ cur+=r[i]; if(r[i]==='。'||r[i]==='．'){ sentences.push(cur.trim()); cur=''; } } if(cur.trim()) sentences.push(cur); return applyNumberHighlight(sentences.join('\n').replace(/\n{2,}/g,'\n')); }
    
    function showTooltip(e,t,c,m){ if(activeTooltipTimer) clearTimeout(activeTooltipTimer); if(currentTooltipElement) currentTooltipElement.remove(); let lines=c.replace(/[\/／]/g,'\n').split(/\n/).filter(l=>l.trim()); let tip=document.createElement('div'); tip.className=m?'feature-tooltip-mobile':'feature-tooltip'; tip.innerHTML=`<div class="term-title">${t}</div>${lines.map(l=>`<div class="term-desc-line">${l.trim()}</div>`).join('')}`; document.body.appendChild(tip); let rect=e.target.getBoundingClientRect(); let left=rect.left+rect.width/2-tip.offsetWidth/2,top=rect.top-tip.offsetHeight-8; if(left<5) left=5; if(top<5) top=rect.bottom+8; tip.style.left=left+'px'; tip.style.top=top+'px'; currentTooltipElement=tip; activeTooltipTimer=setTimeout(()=>{ if(currentTooltipElement) currentTooltipElement.remove(); currentTooltipElement=null; activeTooltipTimer=null; },4000); if(m){ const close=()=>{ if(activeTooltipTimer)clearTimeout(activeTooltipTimer); if(currentTooltipElement)currentTooltipElement.remove(); currentTooltipElement=null; activeTooltipTimer=null; document.removeEventListener('touchstart',close); document.removeEventListener('scroll',close); document.removeEventListener('click',close); }; document.addEventListener('touchstart',close,{once:true}); document.addEventListener('scroll',close,{once:true}); document.addEventListener('click',close,{once:true}); } }
    function bindTermAndFeatureEvents(m){ document.querySelectorAll('.term-highlight').forEach(el=>{ el.removeEventListener(m?'click':'mouseenter',el._handler); let def=termDefinitions[el.dataset.term]||'暂无详细解释'; if(!m){ el._handler=(e)=>{ e.stopPropagation(); showTooltip(e,el.dataset.term,def,false); }; el.addEventListener('mouseenter',el._handler); el.addEventListener('mouseleave',()=>{ if(activeTooltipTimer)clearTimeout(activeTooltipTimer); if(currentTooltipElement)currentTooltipElement.remove(); currentTooltipElement=null; activeTooltipTimer=null; }); } else{ el._handler=(e)=>{ e.stopPropagation(); showTooltip(e,el.dataset.term,def,true); }; el.addEventListener('click',el._handler); } }); document.querySelectorAll('.feature-box').forEach(box=>{ box.removeEventListener(m?'click':'mouseenter',box._handler); let name=box.dataset.name,desc=box.dataset.desc; if(!m){ box._handler=(e)=>{ e.stopPropagation(); showTooltip(e,name,desc,false); }; box.addEventListener('mouseenter',box._handler); box.addEventListener('mouseleave',()=>{ if(activeTooltipTimer)clearTimeout(activeTooltipTimer); if(currentTooltipElement)currentTooltipElement.remove(); currentTooltipElement=null; activeTooltipTimer=null; }); } else{ box._handler=(e)=>{ e.stopPropagation(); showTooltip(e,name,desc,true); }; box.addEventListener('click',box._handler); } }); }
    let activeAcqTooltip=null; function showAcqTooltip(e,t,m){ if(activeAcqTooltip) activeAcqTooltip.remove(); let tip=document.createElement('div'); tip.className=m?'feature-tooltip-mobile':'feature-tooltip'; tip.innerHTML=`<div class="term-title">获取方式</div><div class="term-desc-line" style="text-align:center;">${t}</div>`; document.body.appendChild(tip); let rect=e.currentTarget.getBoundingClientRect(); let left=rect.left+rect.width/2-tip.offsetWidth/2,top=rect.top-tip.offsetHeight-8; if(left<5) left=5; if(top<5) top=rect.bottom+8; tip.style.left=left+'px'; tip.style.top=top+'px'; activeAcqTooltip=tip; if(!m){ const hide=()=>{ if(activeAcqTooltip) activeAcqTooltip.remove(); activeAcqTooltip=null; }; e.currentTarget.removeEventListener('mouseleave',hide); e.currentTarget.addEventListener('mouseleave',hide); tip._hideHandler=hide; } else{ const close=()=>{ if(activeAcqTooltip) activeAcqTooltip.remove(); activeAcqTooltip=null; document.removeEventListener('touchstart',close); document.removeEventListener('scroll',close); document.removeEventListener('click',close); }; setTimeout(()=>{ document.addEventListener('touchstart',close,{once:true}); document.addEventListener('scroll',close,{once:true}); document.addEventListener('click',close,{once:true}); },50); } }
    function clearAllFilters(){ activeFilters={position:"",specialty:"",quality:""}; isMobileDevice()?updateFilterUI():updateDesktopFilterUI(); renderList(); }
    function clearAllSearchBoxes(){ keyword=""; let d=document.getElementById('searchInputDesktop'), m=document.getElementById('searchInputMobile'); if(d) d.value=""; if(m) m.value=""; }
    let isExecutingSearch=false;
    function executeSearch(v){ const cid=new URLSearchParams(location.search).get('car'); if(cid){ if(isExecutingSearch) return; isExecutingSearch=true; clearAllFilters(); const nu=location.pathname; history.replaceState(null,'',nu); let hb=document.getElementById('headerBackBtn'); if(hb) hb.style.display='none'; restoreList(); setTimeout(()=>{ keyword=v; let d=document.getElementById('searchInputDesktop'),m=document.getElementById('searchInputMobile'); if(d&&d.value!==keyword) d.value=keyword; if(m&&m.value!==keyword) m.value=keyword; renderList(); window.scrollTo(0,0); isExecutingSearch=false; },50); } else{ keyword=v; let d=document.getElementById('searchInputDesktop'),m=document.getElementById('searchInputMobile'); if(d&&d.value!==keyword) d.value=keyword; if(m&&m.value!==keyword) m.value=keyword; renderList(); window.scrollTo(0,0); } }
    function handleSearchInput(e){ if(searchDebounceTimer) clearTimeout(searchDebounceTimer); searchDebounceTimer=setTimeout(()=>executeSearch(e.target.value),300); }
    function attachSearchInputEvents(){ let d=document.getElementById('searchInputDesktop'),m=document.getElementById('searchInputMobile'); if(d){ d.removeEventListener('input',d._handler); d._handler=handleSearchInput; d.addEventListener('input',d._handler); } if(m){ m.removeEventListener('input',m._handler); m._handler=handleSearchInput; m.addEventListener('input',m._handler); } }
    
    // 滚动时导航栏增强效果
    function initScrollHeader() {
        const header = document.querySelector('.desktop-header');
        if(!header) return;
        window.addEventListener('scroll', () => {
            if(window.scrollY > 20) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });
    }
    
    async function loadData(){ try{ let vr=await fetch('./vehicles.json'); if(!vr.ok) throw new Error(`HTTP ${vr.status}`); let vobj=await vr.json(); if(!vobj.vehicles) throw new Error('格式错误'); vehiclesData=vobj.vehicles; vehiclesData.forEach(c=>c.quality=getCorrectedQuality(c.name,c.quality)); let tr=await fetch('./terms.json'); if(!tr.ok) throw new Error(`HTTP ${tr.status}`); let tobj=await tr.json(); termDefinitions=tobj.terms||{}; for(let c of vehiclesData) c.chipSlots=sortChipSlots(c.chipSlots); initFilters(); attachSearchInputEvents(); let hb=document.getElementById('headerBackBtn'); if(hb) hb.style.display='none'; let urlCar=new URLSearchParams(location.search).get('car'); if(urlCar){ let car=vehiclesData.find(v=>v.id===urlCar); if(car){ if(hb) hb.style.display='block'; renderDetailById(urlCar); } else renderList(); } else renderList(); window.addEventListener('popstate',()=>{ let cid=new URLSearchParams(location.search).get('car'); let hbe=document.getElementById('headerBackBtn'); if(cid){ let car=vehiclesData.find(v=>v.id===cid); if(car){ if(hbe) hbe.style.display='block'; renderDetailById(cid); } else{ if(hbe) hbe.style.display='none'; clearAllFilters(); restoreList(); } } else{ if(hbe) hbe.style.display='none'; restoreList(); } }); if(isMobileDevice()) document.body.classList.add('has-fixed-header'); else initScrollHeader(); } catch(e){ console.error(e); let g=document.getElementById("carsGrid"),s=document.getElementById("statsText"); if(g) g.innerHTML=`<div style="text-align:center;padding:60px;color:#ff6b6b;"><strong>数据加载失败</strong><br>${e.message}<br>请确保 vehicles.json 和 terms.json 存在且通过 HTTP 服务器访问。</div>`; if(s) s.innerText="加载失败"; } }
    function filterAndSortVehicles(){ let f=vehiclesData.filter(v=>{ if(activeFilters.position && v.position!==activeFilters.position) return false; if(activeFilters.specialty && v.specialty!==activeFilters.specialty) return false; if(activeFilters.quality && v.quality!==activeFilters.quality) return false; if(keyword){ let kw=keyword.toLowerCase(); if(!v.name.toLowerCase().includes(kw) && !(v.skillName&&v.skillName.toLowerCase().includes(kw)) && !(v.searchKeywords&&v.searchKeywords.some(k=>k.toLowerCase().includes(kw)))) return false; } return true; }); return sortVehicles(f); }
    function isMobileDevice(){ return window.innerWidth<=768; }
    function initFilters(){ let mob=isMobileDevice(), mfh=document.getElementById('mobileFixedHeader'); if(mob){ if(mfh) mfh.style.display='flex'; let btns=document.querySelectorAll('.mobile-tab-btn'); btns.forEach(btn=>{ btn.removeEventListener('click',btn._clickHandler); btn.addEventListener('click',btn._clickHandler=()=>{ let pid=btn.dataset.page; if(pid==='vehicles'){ let cur=new URLSearchParams(location.search).get('car'); if(cur){ history.replaceState(null,'',location.pathname); restoreList(); } } else{ let cur=new URLSearchParams(location.search).get('car'); if(cur){ history.replaceState(null,'',location.pathname); restoreList(); } document.querySelectorAll('.page').forEach(p=>p.classList.remove('active-page')); document.getElementById(pid+'Page')?.classList.add('active-page'); } btns.forEach(t=>t.classList.remove('active')); btn.classList.add('active'); if(pid==='vehicles') window.scrollTo(0,0); }); }); document.querySelectorAll('#positionOptions .filter-option').forEach(opt=>{ opt.removeEventListener('click',opt._clickHandler); opt.addEventListener('click',opt._clickHandler=()=>{ let val=opt.dataset.value; activeFilters.position=activeFilters.position===val?"":val; updateFilterUI(); renderList(); }); }); document.querySelectorAll('#specialtyOptions .filter-option').forEach(opt=>{ opt.removeEventListener('click',opt._clickHandler); opt.addEventListener('click',opt._clickHandler=()=>{ let val=opt.dataset.value; activeFilters.specialty=activeFilters.specialty===val?"":val; updateFilterUI(); renderList(); }); }); document.querySelectorAll('#qualityOptions .quality-option').forEach(opt=>{ opt.removeEventListener('click',opt._clickHandler); opt.addEventListener('click',opt._clickHandler=()=>{ let val=opt.dataset.value; activeFilters.quality=activeFilters.quality===val?"":val; updateFilterUI(); renderList(); }); }); let ddbtn=document.getElementById('categoryDropdownBtn'),ddp=document.getElementById('categoryDropdownPanel'); if(ddbtn&&ddp){ ddbtn.removeEventListener('click',ddbtn._clickHandler); ddbtn.addEventListener('click',ddbtn._clickHandler=(e)=>{ e.stopPropagation(); ddp.classList.toggle('show'); ddbtn.classList.toggle('active'); }); document.removeEventListener('click',document._closeDropdown); document._closeDropdown=()=>{ ddp.classList.remove('show'); ddbtn.classList.remove('active'); }; document.addEventListener('click',document._closeDropdown); ddp.addEventListener('click',e=>e.stopPropagation()); } updateFilterUI(); } else{ if(mfh) mfh.style.display='none'; document.querySelectorAll('#desktopPositionOptions .desktop-filter-option').forEach(opt=>{ opt.removeEventListener('click',opt._clickHandler); opt.addEventListener('click',opt._clickHandler=()=>{ let val=opt.dataset.value; activeFilters.position=activeFilters.position===val?"":val; updateDesktopFilterUI(); renderList(); }); }); document.querySelectorAll('#desktopSpecialtyOptions .desktop-filter-option').forEach(opt=>{ opt.removeEventListener('click',opt._clickHandler); opt.addEventListener('click',opt._clickHandler=()=>{ let val=opt.dataset.value; activeFilters.specialty=activeFilters.specialty===val?"":val; updateDesktopFilterUI(); renderList(); }); }); document.querySelectorAll('#desktopQualityOptions .desktop-quality-option').forEach(opt=>{ opt.removeEventListener('click',opt._clickHandler); opt.addEventListener('click',opt._clickHandler=()=>{ let val=opt.dataset.value; activeFilters.quality=activeFilters.quality===val?"":val; updateDesktopFilterUI(); renderList(); }); }); updateDesktopFilterUI(); } }
    function updateFilterUI(){ document.querySelectorAll('#positionOptions .filter-option').forEach(o=>{ if(o.dataset.value===activeFilters.position) o.classList.add('active'); else o.classList.remove('active'); }); document.querySelectorAll('#specialtyOptions .filter-option').forEach(o=>{ if(o.dataset.value===activeFilters.specialty) o.classList.add('active'); else o.classList.remove('active'); }); document.querySelectorAll('#qualityOptions .quality-option').forEach(o=>{ if(o.dataset.value===activeFilters.quality) o.classList.add('active'); else o.classList.remove('active'); }); }
    function updateDesktopFilterUI(){ document.querySelectorAll('#desktopPositionOptions .desktop-filter-option').forEach(o=>{ if(o.dataset.value===activeFilters.position) o.classList.add('active'); else o.classList.remove('active'); }); document.querySelectorAll('#desktopSpecialtyOptions .desktop-filter-option').forEach(o=>{ if(o.dataset.value===activeFilters.specialty) o.classList.add('active'); else o.classList.remove('active'); }); document.querySelectorAll('#desktopQualityOptions .desktop-quality-option').forEach(o=>{ if(o.dataset.value===activeFilters.quality) o.classList.add('active'); else o.classList.remove('active'); }); }
    function renderList(){ let filtered=filterAndSortVehicles(), grid=document.getElementById("carsGrid"), stats=document.getElementById("statsText"); if(!grid) return; if(filtered.length===0){ grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px;color:#8a8aa3;">暂无车辆数据</div>'; stats.innerText="共 0 辆车"; return; } grid.innerHTML=filtered.map(car=>{ let bgClass=getQualityClass(car.quality), borderClass=getBorderClass(car.quality), badgeClass=car.quality==="传说"?"legendary":(car.quality==="史诗"?"epic":(car.quality==="稀有"?"rare":"normal")); let posIcon=POSITION_ICONS[car.position]||POSITION_ICONS["辅助"], specIcon=SPECIALTY_ICONS[car.specialty]||SPECIALTY_ICONS["场地"]; let extraRacing=EXTRA_RACING_ICON_CARS.includes(car.name)?`<div class="meta-item"><img src="${RACING_ICON_URL}"><span>竞速</span></div>`:''; return `<div class="car-card ${borderClass}" data-id="${car.id}"><div class="card-image ${bgClass}"><img src="${car.imageUrl}" referrerpolicy="no-referrer" onerror="this.src='https://placehold.co/400x200?text=Car'"><div class="acquisition-icon" data-acq="${car.acquisition.replace(/"/g,'&quot;')}"><img src="${car.acquisitionIcon}" referrerpolicy="no-referrer"></div></div><div class="card-info"><div class="car-title"><span class="car-name">${car.name}</span></div><div class="car-meta"><div class="meta-item"><img src="${posIcon}"><span>${car.position}</span></div>${extraRacing}<div class="meta-item"><img src="${specIcon}"><span>${car.specialty}</span></div></div><div class="car-description">${car.description}</div></div><div class="quality-badge-wrapper"><span class="quality-badge ${badgeClass}">${car.quality}</span></div></div>`; }).join(""); stats.innerText=`共 ${filtered.length} 辆车`; let mob=isMobileDevice(); document.querySelectorAll('.acquisition-icon').forEach(icon=>{ icon.removeEventListener('mouseenter',icon._mouseEnterHandler); icon.removeEventListener('mouseleave',icon._mouseLeaveHandler); icon.removeEventListener('click',icon._clickHandler); let txt=icon.dataset.acq; if(!mob){ icon._mouseEnterHandler=e=>{ e.stopPropagation(); showAcqTooltip(e,txt,false); }; icon._mouseLeaveHandler=()=>{ if(activeAcqTooltip) activeAcqTooltip.remove(); activeAcqTooltip=null; }; icon.addEventListener('mouseenter',icon._mouseEnterHandler); icon.addEventListener('mouseleave',icon._mouseLeaveHandler); } else{ icon._clickHandler=e=>{ e.stopPropagation(); showAcqTooltip(e,txt,true); }; icon.addEventListener('click',icon._clickHandler); } }); document.querySelectorAll('.car-card').forEach(card=>{ card.removeEventListener('click',card._clickHandler); card._clickHandler=e=>{ if(!e.target.closest('.acquisition-icon')) showDetail(card.dataset.id); }; card.addEventListener('click',card._clickHandler); }); document.querySelectorAll('.page').forEach(p=>p.classList.remove('active-page')); document.getElementById('vehiclesPage').classList.add('active-page'); window.scrollTo(0,0); }
    function showDetail(id){ let car=vehiclesData.find(v=>v.id===id); if(!car) return; let cur=new URLSearchParams(location.search).get('car'); if(cur===id) return; if(cur){ history.replaceState({carId:id},'',location.pathname+'?car='+id); } else{ history.pushState({carId:id},'',location.pathname+'?car='+id); } let hb=document.getElementById('headerBackBtn'); if(hb) hb.style.display='block'; clearAllSearchBoxes(); renderDetailById(id); }
    function renderDetailById(cid){ let car=vehiclesData.find(v=>v.id===cid); if(!car) return; let stats=car.stats, chipSlots=car.chipSlots.map(t=>CHIP_ICONS[t]), bgClass=getQualityClass(car.quality); let posIcon=POSITION_ICONS[car.position]||POSITION_ICONS["辅助"], specIcon=SPECIALTY_ICONS[car.specialty]||SPECIALTY_ICONS["场地"]; let ultDesc=formatSkillText(car.skills.ult.desc), recuDesc=formatSkillText(car.skills.ult.recu), passiveDesc=formatSkillText(car.skills.passive.desc); let ultPassiveBlock=car.skills.ult.ultPassive?`<div class="sub-skill"><div class="sub-skill-title">解锁大招被动</div><div class="sub-skill-desc">${formatSkillText(car.skills.ult.ultPassive)}</div></div>`:''; let featuresHtml=(car.skills.features&&car.skills.features.length)?car.skills.features.map(f=>`<div class="feature-box" data-desc="${(f.desc||'').replace(/"/g,'&quot;')}" data-name="${f.name}" data-color="${f.color||'默认'}">${f.name}</div>`).join(''):'<div style="color:#8a8aa3;padding:10px;">暂无特点数据</div>'; let spBlockHtml=''; if(car.sp){ let spDesc=formatSkillText(car.sp.desc); spBlockHtml=`<div class="skill-block"><div class="skill-header"><div class="skill-icon"><img src="${car.sp.icon}"></div><div class="skill-title">SP：${car.sp.name}</div></div><div class="skill-desc"><div class="sp-cooltime">冷却时间：${car.sp.cooltime}</div>${spDesc}</div></div>`; } let html=`<div class="detail-container"><div class="detail-header"><div class="detail-image ${bgClass}"><img src="${car.imageUrl}" onerror="this.src='https://placehold.co/600x400?text=Car'"><div class="detail-acquisition-area"><div class="detail-acquisition-icon"><img src="${car.acquisitionIcon}"></div><span class="detail-acquisition-text">${car.acquisition}</span></div></div><div class="detail-info-panel"><div class="detail-name">${car.name}</div><div class="detail-badges"><span class="quality-badge-large">${car.quality}</span><div class="badge"><img src="${posIcon}"> ${car.position}位</div><div class="badge"><img src="${specIcon}"> ${car.specialty}</div></div><div class="info-rows"><div class="info-row"><span class="info-label">注册日期</span><span class="info-value">${car.registerDate||'未知'}</span></div><div class="info-row"><span class="info-label">车辆类型</span><span class="info-value">${car.vehicleType||'未知'}</span></div><div class="info-row"><span class="info-label">厂商</span><span class="info-value">${car.manufacturer||'未知'}</span></div></div></div></div><div class="features-section"><div class="section-title">车辆特点</div><div class="features-horizontal">${featuresHtml}</div></div><div class="chip-slots"><div class="section-title">芯片槽</div><div class="chip-icons">${chipSlots.map(icon=>`<div class="chip-icon"><img src="${icon}"></div>`).join('')}</div></div><div class="chip-workshop"><div class="workshop-title">芯片要求搭配</div><div class="workshop-placeholder">芯片要求搭配（配合赋能版）预留区<p>后续版本将展示社区高玩芯片组合、赋能推荐以及AI智能搭配方案</p></div></div><div class="vehicle-stats"><div class="section-title">车辆基础数据</div><div class="stats-grid"><div class="stat-card"><span>极速</span><span>${stats.topSpeed}</span></div><div class="stat-card"><span>动力</span><span>${stats.power}</span></div><div class="stat-card"><span>耐久</span><span>${stats.durability}</span></div><div class="stat-card"><span>氮气充能</span><span class="gold-number">${stats.nitroCharge}</span></div><div class="stat-card"><span>起步充能</span><span class="gold-number">${stats.startCharge}</span></div><div class="stat-card"><span>氮气时长</span><span>${stats.nitroDuration}</span></div><div class="stat-card"><span>氮气极速</span><span><span class="blue">${stats.nitroSpeed.blue}</span> / <span class="purple">${stats.nitroSpeed.purple}</span></span></div><div class="stat-card"><span>涡轮时长</span><span><span class="blue">${stats.turboDuration.blue}</span> / <span class="purple">${stats.turboDuration.purple}</span></span></div><div class="stat-card"><span>涡轮极速</span><span><span class="blue">${stats.turboSpeed.blue}</span> / <span class="purple">${stats.turboSpeed.purple}</span></span></div><div class="stat-card"><span>大招动力</span><span>${stats.ultPower}</span></div></div></div><div class="skills-section"><div class="skill-block"><div class="skill-header"><div class="skill-icon"><img src="${car.ultIcon}"></div><div class="skill-title">大招：${car.skills.ult.name}</div></div><div class="skill-desc">${ultDesc}</div><div class="sub-skill"><div class="sub-skill-title">RECU限制解除（8级解锁）</div><div class="sub-skill-desc">${recuDesc}</div></div>${ultPassiveBlock}</div><div class="skill-block"><div class="skill-header"><div class="skill-icon"><img src="${car.passiveIcon}"></div><div class="skill-title">被动：${car.skills.passive.name}</div></div><div class="skill-desc">${passiveDesc}</div></div>${spBlockHtml}</div></div>`; document.getElementById("vehiclesPage").innerHTML=html; bindTermAndFeatureEvents(isMobileDevice()); document.querySelectorAll('.page').forEach(p=>p.classList.remove('active-page')); document.getElementById('vehiclesPage').classList.add('active-page'); window.scrollTo(0,0); }
    function restoreList(){ let vp=document.getElementById("vehiclesPage"); vp.innerHTML=`<div class="cars-grid" id="carsGrid"></div><div class="stats-text" id="statsText">加载中...</div>`; renderList(); document.querySelectorAll('.page').forEach(p=>p.classList.remove('active-page')); vp.classList.add('active-page'); window.scrollTo(0,0); }
    function initTabs(){ document.querySelectorAll('.sidebar .tab-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ let pid=btn.dataset.page; if(pid==='vehicles'){ let cur=new URLSearchParams(location.search).get('car'); if(cur){ history.replaceState(null,'',location.pathname); restoreList(); } } else{ let cur=new URLSearchParams(location.search).get('car'); if(cur){ history.replaceState(null,'',location.pathname); restoreList(); } document.querySelectorAll('.page').forEach(p=>p.classList.remove('active-page')); document.getElementById(pid+'Page')?.classList.add('active-page'); } document.querySelectorAll('.sidebar .tab-btn').forEach(t=>t.classList.remove('active')); btn.classList.add('active'); if(pid==='vehicles') window.scrollTo(0,0); }); }); }
    initTabs(); loadData();
</script>
