<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>王牌竞速 · 情报站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        .app-container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }
        
        .header { background: #14141f; border-radius: 20px; padding: 16px 24px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .logo-area h1 { font-size: 1.5rem; background: linear-gradient(135deg, #ff6b6b, #feca57); -webkit-background-clip: text; background-clip: text; color: transparent; cursor: pointer; }
        .logo-area p { font-size: 0.7rem; color: #8a8aa3; }
        .nav-tabs { display: flex; gap: 12px; background: #1f1f2e; padding: 4px; border-radius: 48px; flex-wrap: wrap; }
        .tab-btn { padding: 8px 20px; border: none; background: transparent; border-radius: 40px; font-size: 0.85rem; cursor: pointer; color: #a0a0b8; transition: 0.2s; }
        .tab-btn.active { background: #2a2a3c; color: white; }
        
        .page { display: none; }
        .page.active-page { display: block; }
        
        .filter-bar { background: #14141f; border-radius: 20px; padding: 16px 20px; margin-bottom: 24px; }
        .search-box { margin-bottom: 16px; }
        .search-box input { width: 100%; max-width: 400px; padding: 10px 16px; border-radius: 40px; border: 1px solid #2a2a3c; background: #1f1f2e; color: #e2e2e6; }
        .filter-groups { display: flex; flex-wrap: wrap; gap: 20px; }
        .filter-group { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .filter-label { font-size: 0.75rem; color: #8a8aa3; margin-right: 4px; }
        .filter-btn { padding: 5px 14px; border-radius: 30px; background: #1f1f2e; border: none; font-size: 0.75rem; cursor: pointer; color: #a0a0b8; }
        .filter-btn.active { background: #feca57; color: #1a1a2e; font-weight: 500; }
        
        .cars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .car-card { background: #14141f; border-radius: 24px; overflow: hidden; cursor: pointer; border: 1px solid #2a2a3c; transition: transform 0.2s, border-color 0.2s; }
        .car-card:hover { transform: translateY(-4px); border-color: #feca57; }
        
        /* ==================== 高级品质背景特效 ==================== */
        .card-image { height: 180px; display: flex; align-items: center; justify-content: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); position: relative; overflow: hidden; }
        .card-image img { max-width: 100%; max-height: 100%; object-fit: contain; position: relative; z-index: 3; filter: drop-shadow(0 8px 20px rgba(0,0,0,0.5)); transition: transform 0.3s ease; }
        .car-card:hover .card-image img { transform: scale(1.02); }
        
        /* ---------- 传说品质 - 璀璨暗金 · 流动光纹 ---------- */
        .card-image.legendary {
            background: radial-gradient(ellipse at 30% 40%, #2a1a0a 0%, #0f0a05 100%);
        }
        .card-image.legendary::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, 
                transparent 0deg, 
                rgba(255, 215, 0, 0.15) 60deg,
                rgba(255, 180, 0, 0.08) 120deg,
                transparent 180deg,
                rgba(255, 215, 0, 0.1) 240deg,
                transparent 300deg);
            animation: legendaryRotate 8s linear infinite;
            pointer-events: none;
        }
        .card-image.legendary::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 40%, rgba(255, 215, 0, 0.12), transparent 70%),
                        repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255, 215, 0, 0.03) 2px, rgba(255, 215, 0, 0.03) 4px);
            pointer-events: none;
        }
        @keyframes legendaryRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* ---------- 史诗品质 - 神秘紫韵 · 脉冲光晕 ---------- */
        .card-image.epic {
            background: radial-gradient(ellipse at 70% 30%, #1a0a2e 0%, #0a0512 100%);
        }
        .card-image.epic::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 60% 40%, rgba(156, 39, 176, 0.2), transparent 60%);
            animation: epicPulse 3s ease-in-out infinite;
            pointer-events: none;
        }
        .card-image.epic::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(125deg, rgba(156, 39, 176, 0.08) 0%, rgba(236, 64, 122, 0.04) 50%, transparent 100%);
            pointer-events: none;
        }
        @keyframes epicPulse {
            0% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.08); }
            100% { opacity: 0.4; transform: scale(1); }
        }
        
        /* ---------- 稀有品质 - 冰霜蓝调 · 流动光束 ---------- */
        .card-image.rare {
            background: radial-gradient(ellipse at 30% 70%, #0a1a3a 0%, #050a15 100%);
        }
        .card-image.rare::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -20%;
            width: 150%;
            height: 150%;
            background: linear-gradient(125deg, transparent 40%, rgba(33, 150, 243, 0.12) 60%, transparent 80%);
            animation: rareFlow 5s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes rareFlow {
            0% { transform: translateX(-20%) translateY(-10%) rotate(-10deg); opacity: 0.3; }
            50% { transform: translateX(10%) translateY(5%) rotate(5deg); opacity: 0.7; }
            100% { transform: translateX(-20%) translateY(-10%) rotate(-10deg); opacity: 0.3; }
        }
        
        /* ---------- 普通品质 - 翠绿自然 · 柔光呼吸 ---------- */
        .card-image.normal {
            background: radial-gradient(ellipse at 50% 50%, #0a2a1a 0%, #051208 100%);
        }
        .card-image.normal::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 40% 50%, rgba(76, 175, 80, 0.1), transparent 70%);
            animation: normalBreath 4s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes normalBreath {
            0% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
            100% { opacity: 0.3; transform: scale(1); }
        }
        
        .acquisition-icon {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 64px;
            height: 64px;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.2s;
            background: transparent;
            border-radius: 0;
        }
        .acquisition-icon:hover { transform: scale(1.08); }
        .acquisition-icon img { width: 100%; height: 100%; object-fit: contain; }
        
        .card-info { padding: 16px; background: rgba(20,20,31,0.9); }
        .car-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .car-name { font-size: 1.1rem; font-weight: 700; color: #e2e2e6; }
        .quality-badge { font-size: 0.65rem; padding: 2px 8px; border-radius: 20px; }
        .quality-badge.legendary { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #1a1a2e; font-weight: bold; box-shadow: 0 0 8px rgba(255,215,0,0.5); }
        .quality-badge.epic { background: linear-gradient(135deg, #9c27b0, #e91e63); color: white; box-shadow: 0 0 8px rgba(156,39,176,0.4); }
        .quality-badge.rare { background: linear-gradient(135deg, #2196f3, #00bcd4); color: white; box-shadow: 0 0 8px rgba(33,150,243,0.3); }
        .quality-badge.normal { background: linear-gradient(135deg, #4caf50, #8bc34a); color: white; }
        .car-meta { display: flex; gap: 12px; margin-bottom: 10px; }
        .meta-item { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.08); padding: 4px 10px; border-radius: 40px; font-size: 0.7rem; color: #a0a0b8; }
        .meta-item img { width: 18px; height: 18px; }
        .car-description { font-size: 0.75rem; color: #8a8aa3; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 10px; line-height: 1.4; }
        .stats-text { text-align: center; padding: 16px; color: #8a8aa3; }
        
        /* 详情页样式（精简） */
        .detail-container { background: #14141f; border-radius: 24px; border: 1px solid #2a2a3c; position: relative; padding-top: 70px; }
        .detail-back-btn {
            position: absolute;
            top: 20px;
            left: 24px;
            background: #1f1f2e;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            color: #a0a0b8;
            font-size: 0.85rem;
            z-index: 20;
            transition: 0.2s;
        }
        .detail-back-btn:hover { background: #feca57; color: #1a1a2e; }
        
        .detail-header { display: flex; gap: 30px; padding: 30px 40px 20px 40px; flex-wrap: wrap; }
        .detail-image { flex: 2; min-width: 280px; border-radius: 24px; display: flex; align-items: center; justify-content: center; padding: 50px 40px; border: 1px solid rgba(255,255,255,0.08); position: relative; overflow: hidden; }
        .detail-image.legendary {
            background: radial-gradient(ellipse at 30% 40%, #2a1a0a 0%, #0f0a05 100%);
        }
        .detail-image.legendary::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent 0deg, rgba(255,215,0,0.12) 60deg, rgba(255,180,0,0.06) 120deg, transparent 180deg, rgba(255,215,0,0.08) 240deg, transparent 300deg);
            animation: legendaryRotate 8s linear infinite;
            pointer-events: none;
        }
        .detail-image.epic {
            background: radial-gradient(ellipse at 70% 30%, #1a0a2e 0%, #0a0512 100%);
        }
        .detail-image.epic::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 60% 40%, rgba(156,39,176,0.15), transparent 60%);
            animation: epicPulse 3s ease-in-out infinite;
            pointer-events: none;
        }
        .detail-image.rare {
            background: radial-gradient(ellipse at 30% 70%, #0a1a3a 0%, #050a15 100%);
        }
        .detail-image.rare::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -20%;
            width: 150%;
            height: 150%;
            background: linear-gradient(125deg, transparent 40%, rgba(33,150,243,0.1) 60%, transparent 80%);
            animation: rareFlow 5s ease-in-out infinite;
            pointer-events: none;
        }
        .detail-image.normal {
            background: radial-gradient(ellipse at 50% 50%, #0a2a1a 0%, #051208 100%);
        }
        .detail-image.normal::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 40% 50%, rgba(76,175,80,0.08), transparent 70%);
            animation: normalBreath 4s ease-in-out infinite;
            pointer-events: none;
        }
        .detail-image img { width: 100%; max-height: 420px; object-fit: contain; position: relative; z-index: 2; filter: drop-shadow(0 8px 20px rgba(0,0,0,0.5)); }
        
        .detail-acquisition-area {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 20px 8px 16px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 15;
        }
        .detail-acquisition-icon { width: 72px; height: 72px; cursor: pointer; transition: transform 0.2s; background: transparent; border-radius: 0; }
        .detail-acquisition-icon:hover { transform: scale(1.05); }
        .detail-acquisition-icon img { width: 100%; height: 100%; object-fit: contain; }
        .detail-acquisition-text { font-size: 0.95rem; color: #feca57; font-weight: 600; letter-spacing: 0.5px; white-space: nowrap; text-shadow: 0 0 2px rgba(0,0,0,0.5); }
        
        .detail-info-panel { flex: 1; min-width: 260px; background: rgba(15,15,26,0.8); backdrop-filter: blur(10px); border-radius: 24px; padding: 20px; border: 1px solid rgba(255,255,255,0.08); }
        .detail-name { font-size: 1.7rem; color: #e2e2e6; margin-bottom: 16px; letter-spacing: -0.2px; }
        .detail-badges { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
        .badge { background: rgba(255,255,255,0.08); padding: 6px 14px; border-radius: 40px; font-size: 0.8rem; color: #a0a0b8; display: flex; align-items: center; gap: 8px; }
        .badge img { width: 18px; height: 18px; }
        .quality-badge-large { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #1a1a2e; padding: 6px 14px; border-radius: 40px; font-weight: 600; box-shadow: 0 0 10px rgba(255,215,0,0.3); }
        
        .info-rows { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 18px; }
        .info-row { display: flex; background: rgba(0,0,0,0.3); padding: 10px 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.05); }
        .info-label { width: 90px; color: #8a8aa3; font-size: 0.75rem; }
        .info-value { color: #e2e2e6; font-size: 0.8rem; font-weight: 500; }
        
        .features-section { padding: 20px 40px 12px 40px; border-top: 1px solid rgba(255,255,255,0.08); }
        .section-title { font-size: 1rem; color: #e2e2e6; margin-bottom: 20px; padding-left: 12px; border-left: 4px solid #feca57; }
        .features-horizontal { display: flex; flex-wrap: wrap; gap: 16px; justify-content: flex-start; align-items: center; }
        .feature-box { background: rgba(30, 30, 50, 0.9); border: 2px solid #feca57; border-radius: 40px; padding: 10px 24px; text-align: center; cursor: pointer; transition: all 0.2s ease; font-weight: 600; font-size: 0.85rem; color: #feca57; white-space: nowrap; }
        .feature-box:hover { transform: translateY(-2px); background: rgba(254, 202, 87, 0.2); box-shadow: 0 4px 12px rgba(254, 202, 87, 0.2); }
        
        .feature-tooltip {
            position: fixed;
            background: #1e1e2e;
            border: 1px solid #feca57;
            border-radius: 12px;
            padding: 8px 14px;
            font-size: 0.75rem;
            color: #e2e2e6;
            max-width: 260px;
            text-align: center;
            z-index: 1000;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
        }
        
        .chip-slots { padding: 20px 40px 12px 40px; border-top: 1px solid rgba(255,255,255,0.08); }
        .chip-icons { display: flex; gap: 12px; flex-wrap: wrap; }
        .chip-icon { width: 56px; height: 56px; background: rgba(0,0,0,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid rgba(255,255,255,0.15); }
        
        .chip-workshop { margin: 0 40px 20px 40px; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 16px 20px; border: 1px solid rgba(255,255,255,0.08); }
        .workshop-title { font-size: 0.95rem; font-weight: 600; color: #e2e2e6; margin-bottom: 12px; }
        .workshop-placeholder { background: rgba(0,0,0,0.3); border-radius: 16px; padding: 28px 20px; text-align: center; color: #6a6a82; border: 1px dashed rgba(255,255,255,0.15); font-size: 0.8rem; }
        
        .vehicle-stats, .skills-section { padding: 12px 40px 24px 40px; border-top: 1px solid rgba(255,255,255,0.08); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .stat-card { background: rgba(0,0,0,0.3); padding: 12px 16px; border-radius: 16px; display: flex; justify-content: space-between; border: 1px solid rgba(255,255,255,0.08); }
        .stat-card span:first-child { color: #8a8aa3; font-size: 0.8rem; }
        .stat-card span:last-child { color: #e2e2e6; font-weight: 600; }
        .blue { color: #3b82f6 !important; font-weight: 600; }
        .purple { color: #a855f7 !important; font-weight: 600; }
        
        .skill-block { margin-bottom: 24px; }
        .skill-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .skill-icon { width: 44px; height: 44px; background: rgba(0,0,0,0.4); border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .skill-icon img { width: 100%; height: 100%; object-fit: contain; border-radius: 8px; }
        .skill-title { font-size: 1rem; font-weight: 700; color: #e2e2e6; }
        .skill-desc { background: rgba(0,0,0,0.3); padding: 14px 18px; border-radius: 16px; color: #a0a0b8; font-size: 0.85rem; line-height: 1.5; border: 1px solid rgba(255,255,255,0.08); }
        .sub-skill { background: rgba(0,0,0,0.3); padding: 12px 16px; border-radius: 14px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.08); }
        .sub-skill-title { font-weight: 600; font-size: 0.8rem; color: #c0c0d0; margin-bottom: 6px; }
        .sub-skill-desc { font-size: 0.75rem; color: #8a8aa3; }
        .red-number { color: #ff6b6b; font-weight: 600; }
        
        @media (max-width: 900px) {
            .detail-header { flex-direction: column; padding: 20px; }
            .chip-slots, .vehicle-stats, .skills-section, .features-section { padding: 12px 20px 20px 20px; }
            .chip-workshop { margin: 0 20px 16px 20px; }
            .detail-acquisition-area { padding: 6px 16px; gap: 10px; }
            .detail-acquisition-icon { width: 56px; height: 56px; }
            .detail-acquisition-text { font-size: 0.8rem; white-space: normal; }
            .detail-image { padding: 30px; }
            .detail-image img { max-height: 300px; }
            .feature-box { white-space: normal; font-size: 0.75rem; padding: 8px 16px; }
            .features-horizontal { gap: 12px; }
        }
        @media (max-width: 700px) {
            .app-container { padding: 12px; }
            .cars-grid { grid-template-columns: 1fr; }
            .chip-workshop { margin: 0 16px 12px 16px; }
            .acquisition-icon { width: 56px; height: 56px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo-area" onclick="location.reload()">
            <h1>王牌竞速 · 情报站</h1>
            <p>核心档案 · 赛车数据</p>
        </div>
        <div class="nav-tabs">
            <button class="tab-btn active" data-page="vehicles">车辆数据</button>
            <button class="tab-btn" data-page="chip">芯片架构</button>
            <button class="tab-btn" data-page="energy">赋能系统</button>
            <button class="tab-btn" data-page="calculator">芯片要求计算器</button>
            <button class="tab-btn" data-page="news">爆料信息</button>
        </div>
    </div>

    <div id="vehiclesPage" class="page active-page">
        <div class="filter-bar">
            <div class="search-box"><input type="text" id="searchInput" placeholder="搜索车辆名称、技能..."></div>
            <div class="filter-groups">
                <div class="filter-group"><span class="filter-label">定位：</span>
                    <button class="filter-btn active" data-type="position" data-value="all">全部</button>
                    <button class="filter-btn" data-type="position" data-value="辅助">辅助</button>
                    <button class="filter-btn" data-type="position" data-value="竞速">竞速</button>
                    <button class="filter-btn" data-type="position" data-value="干扰">干扰</button>
                    <button class="filter-btn" data-type="position" data-value="天平">天平</button>
                </div>
                <div class="filter-group"><span class="filter-label">专精：</span>
                    <button class="filter-btn active" data-type="specialty" data-value="all">全部</button>
                    <button class="filter-btn" data-type="specialty" data-value="城市">城市</button>
                    <button class="filter-btn" data-type="specialty" data-value="山路">山路</button>
                    <button class="filter-btn" data-type="specialty" data-value="场地">场地</button>
                </div>
                <div class="filter-group"><span class="filter-label">品质：</span>
                    <button class="filter-btn active" data-type="quality" data-value="all">全部</button>
                    <button class="filter-btn" data-type="quality" data-value="传说">传说</button>
                    <button class="filter-btn" data-type="quality" data-value="史诗">史诗</button>
                    <button class="filter-btn" data-type="quality" data-value="稀有">稀有</button>
                </div>
            </div>
        </div>
        <div class="cars-grid" id="carsGrid"></div>
        <div class="stats-text" id="statsText">加载中...</div>
    </div>

    <div id="chipPage" class="page"><div style="text-align:center; padding:60px; color:#8a8aa3;">芯片架构 - 数据导入中...</div></div>
    <div id="energyPage" class="page"><div style="text-align:center; padding:60px; color:#8a8aa3;">赋能系统 - 数据导入中...</div></div>
    <div id="calculatorPage" class="page"><div style="text-align:center; padding:60px; color:#8a8aa3;">芯片要求计算器 - 即将上线...</div></div>
    <div id="newsPage" class="page"><div style="text-align:center; padding:60px; color:#8a8aa3;">爆料信息 - 数据导入中...</div></div>
</div>

<script>
    // ==================== 图标资源 ====================

        renderList();
        isDetail = false;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        vehiclesPage.classList.add('active-page');
    }
    
    function bindFilters() {
        document.querySelectorAll('#vehiclesPage .filter-btn').forEach(btn => {
            btn.removeEventListener('click', btn._listener);
            btn.addEventListener('click', btn._listener = () => {
                let type = btn.dataset.type, value = btn.dataset.value;
                if (type && value) { filters[type] = value; document.querySelectorAll(`#vehiclesPage .filter-btn[data-type="${type}"]`).forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderList(); }
            });
        });
        let si = document.getElementById('searchInput');
        if (si) { si.removeEventListener('input', si._listener); si.addEventListener('input', si._listener = (e) => { filters.keyword = e.target.value; renderList(); }); }
    }
    
    function initTabs() {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                let pageId = btn.dataset.page;
                if (pageId === 'vehicles' && isDetail) restoreList();
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
                document.getElementById(pageId + 'Page')?.classList.add('active-page');
                document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                if (pageId !== 'vehicles') isDetail = false;
            });
        });
    }
    
    initTabs();
    bindFilters();
    renderList();
</script>
</body>
</html>
