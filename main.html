    <style>
        /* ========== 基础样式保持不变 ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        
        /* 左侧固定导航布局（电脑端） */

        .sidebar .logo-area h1 { font-size: 1.2rem; background: linear-gradient(135deg, #ff6b6b, #feca57); -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: 800; }

        .card-image.epic::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 25% 35%, rgba(156,39,176,0.15), rgba(255,215,0,0.05) 60%, transparent 80%); pointer-events: none; }
        .card-image.rare { background: linear-gradient(145deg, #0e1a2a 0%, #060d15 100%); }

    function sortChipSlots(slots) {
        const order = { "circle": 0, "triangle": 1, "rhombus": 2, "hexagon": 3, "vslot": 4 };
        return [...slots].sort((a, b) => (order[a] ?? 5) - (order[b] ?? 5));
    }
    function getQualityClass(quality) {
        if (quality === "传说") return "legendary";
        if (quality === "史诗") return "epic";
        if (quality === "稀有") return "rare";
        return "normal";
    }
    function getBorderClass(quality) {
        if (quality === "传说") return "legendary-border";
        if (quality === "史诗") return "epic-border";
        if (quality === "稀有") return "rare-border";
        return "normal-border";
    }
    function getCorrectedQuality(carName, originalQuality) {
        const lowerName = carName.toLowerCase();
        for (const [key, value] of Object.entries(qualityOverrides)) {
            if (lowerName.includes(key.toLowerCase())) return value;
        }
        return originalQuality;
    }
    function sortVehicles(vehicles) {
        return [...vehicles].sort((a, b) => {
            const dateA = new Date(a.registerDate);
            const dateB = new Date(b.registerDate);
            if (dateA.getTime() !== dateB.getTime()) return dateB.getTime() - dateA.getTime();
            const qualityA = qualityWeight[a.quality] || 0;
            const qualityB = qualityWeight[b.quality] || 0;
            if (qualityA !== qualityB) return qualityB - qualityA;
            const posA = positionWeight[a.position] || 0;
            const posB = positionWeight[b.position] || 0;
            return posB - posA;
        });
    }
    function applyNumberHighlight(text) {
        if (!text) return text;
        let result = text;
        result = result.replace(/(\d+(?:\.\d+)?%)/g, '<span class="red-number">$1</span>');
        result = result.replace(/(\d+(?:\.\d+)?)(?![^<]*>)(?![^<]*<\/span>)/g, (match) => '<span class="red-number">' + match + '</span>');
        result = result.replace(/<span class="red-number"><span class="red-number">(.*?)<\/span><\/span>/g, '<span class="red-number">$1</span>');
        return result;
    }
    function highlightTerms(text) {
        if (!text) return text;
        let result = text;
        const terms = Object.keys(termDefinitions);
        for (const term of terms) {
            const regex = new RegExp(`(${term})`, 'g');
            result = result.replace(regex, `<span class="term-highlight" data-term="${term}">${term}</span>`);
        }
        return result;
    }
    // 修复大招排版：遇到中文冒号“：”或英文冒号“:”以及分号“；”“;”都换行
    function formatSkillText(text) {
        if (!text) return text;
        // 先进行术语高亮
        let result = highlightTerms(text);
        // 将中文/英文冒号、分号替换为换行符（保留原符号但换行，增强可读性）
        // 规则：在冒号或分号后面添加换行，但避免在HTML标签内破坏结构
        result = result.replace(/([：:；;])\s*/g, '$1\n');
        // 处理可能的连续换行
        result = result.replace(/\n{2,}/g, '\n');
        // 处理“越野车：”特殊前缀不额外换行（保持原样）
        result = result.replace(/(越野车[：:])\s*\n/g, '$1 ');
        // 按句号等分割（保持原有分割逻辑）
        let sentences = [], current = '';
        for (let i = 0; i < result.length; i++) {
            current += result[i];
            if (result[i] === '。' || result[i] === '．') { 
                sentences.push(current.trim()); 
                current = ''; 
            }
        }
        if (current.trim().length > 0) sentences.push(current);
        let formatted = sentences.join('\n');
        formatted = formatted.replace(/\n{2,}/g, '\n');
        formatted = applyNumberHighlight(formatted);
        return formatted;
    }
    
    function showTooltip(e, title, content, isMobile) {
        if (activeTooltipTimer) clearTimeout(activeTooltipTimer);
        if (currentTooltipElement && currentTooltipElement.remove) currentTooltipElement.remove();
        let displayContent = content.replace(/[\/／]/g, '\n');
        let lines = displayContent.split(/\n/).filter(l => l.trim().length > 0);
        let descHtml = lines.map(l => `<div class="term-desc-line">${l.trim()}</div>`).join('');
        let tip = document.createElement('div');
        tip.className = isMobile ? 'feature-tooltip-mobile' : 'feature-tooltip';
        tip.innerHTML = `<div class="term-title">${title}</div>${descHtml}`;
        document.body.appendChild(tip);
        let rect = e.target.getBoundingClientRect();
        let left = rect.left + rect.width/2 - tip.offsetWidth/2;
        let top = rect.top - tip.offsetHeight - 8;
        if (left < 5) left = 5;
        if (top < 5) top = rect.bottom + 8;
        tip.style.left = left + 'px';
        tip.style.top = top + 'px';
        currentTooltipElement = tip;
        activeTooltipTimer = setTimeout(() => { if (currentTooltipElement) currentTooltipElement.remove(); currentTooltipElement = null; activeTooltipTimer = null; }, 4000);
        if (isMobile) {
            const close = () => { if (activeTooltipTimer) clearTimeout(activeTooltipTimer); if (currentTooltipElement) currentTooltipElement.remove(); currentTooltipElement = null; activeTooltipTimer = null; document.removeEventListener('touchstart', close); document.removeEventListener('scroll', close); document.removeEventListener('click', close); };
            document.addEventListener('touchstart', close, { once: true });
            document.addEventListener('scroll', close, { once: true });
            document.addEventListener('click', close, { once: true });
        }
    }

    // 数据加载函数
    async function loadData() {
        try {
            const vehiclesUrl = './vehicles.json';
            const termsUrl = './terms.json';
            console.log('[加载] 尝试加载车辆数据:', vehiclesUrl);
            const vehiclesResponse = await fetch(vehiclesUrl);
            if (!vehiclesResponse.ok) {
                throw new Error(`HTTP ${vehiclesResponse.status}: 无法加载 vehicles.json`);
            }
            const vehiclesDataObj = await vehiclesResponse.json();
            if (!vehiclesDataObj.vehicles || !Array.isArray(vehiclesDataObj.vehicles)) {
                throw new Error('vehicles.json 格式错误：缺少 vehicles 数组');
            }
            vehiclesData = vehiclesDataObj.vehicles;
            vehiclesData.forEach(car => { car.quality = getCorrectedQuality(car.name, car.quality); });
            console.log(`[加载] 成功加载 ${vehiclesData.length} 辆车辆数据`);
            
            console.log('[加载] 尝试加载术语数据:', termsUrl);
            const termsResponse = await fetch(termsUrl);
            if (!termsResponse.ok) {
                throw new Error(`HTTP ${termsResponse.status}: 无法加载 terms.json`);
            }
            const termsDataObj = await termsResponse.json();
            if (!termsDataObj.terms) {
                throw new Error('terms.json 格式错误：缺少 terms 对象');
            }
            termDefinitions = termsDataObj.terms;
            console.log(`[加载] 成功加载 ${Object.keys(termDefinitions).length} 个术语`);
            
            for (const car of vehiclesData) car.chipSlots = sortChipSlots(car.chipSlots);
            initFilters();
            attachSearchInputEvents();
            renderList();
        } catch (error) {
            console.error('[加载错误]', error);
            const gridEl = document.getElementById("carsGrid");
            const statsEl = document.getElementById("statsText");
            if (gridEl) {
                gridEl.innerHTML = `<div style="text-align:center; padding:60px; color:#ff6b6b;">
                    <strong>数据加载失败</strong><br>
                    ${error.message}<br>
                    请确保 vehicles.json 和 terms.json 文件存在于当前目录，<br>
                    并且通过 HTTP 服务器访问（不要直接双击打开 HTML 文件）。
                </div>`;
            }
            if (statsEl) statsEl.innerText = "加载失败，请查看控制台(F12)";
        }
    }
    
    function filterAndSortVehicles() {
        let filtered = vehiclesData.filter(v => {
            if (activeFilters.position && v.position !== activeFilters.position) return false;
            if (activeFilters.specialty && v.specialty !== activeFilters.specialty) return false;
            if (activeFilters.quality && v.quality !== activeFilters.quality) return false;
            if (keyword) {
                const lowerKeyword = keyword.toLowerCase();
                if (!v.name.toLowerCase().includes(lowerKeyword) &&
                    !(v.skillName && v.skillName.toLowerCase().includes(lowerKeyword)) &&
                    !(v.searchKeywords && v.searchKeywords.some(k => k.toLowerCase().includes(lowerKeyword)))) return false;
            }
            return true;
        });
        return sortVehicles(filtered);
    }
    
    function isMobileDevice() { return window.innerWidth <= 768; }
    
    function initFilters() {
        const isMobile = isMobileDevice();
        const desktopFilterBar = document.getElementById('desktopGlobalFilterBar');
        const mobileFixedHeader = document.getElementById('mobileFixedHeader');
        if (isMobile) {
            if (mobileFixedHeader) mobileFixedHeader.style.display = 'flex';
            if (desktopFilterBar) desktopFilterBar.style.display = 'none';
            const mobileTabBtns = document.querySelectorAll('.mobile-tab-btn');
            mobileTabBtns.forEach(btn => {
                btn.removeEventListener('click', btn._clickHandler);
                btn.addEventListener('click', btn._clickHandler = () => {
                    const pageId = btn.dataset.page;
                    if (pageId === 'vehicles' && isDetail) restoreList();
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
                    document.getElementById(pageId + 'Page')?.classList.add('active-page');
                    mobileTabBtns.forEach(t => t.classList.remove('active'));
                    btn.classList.add('active');
                    if (pageId !== 'vehicles') isDetail = false;
                    if (pageId === 'vehicles') window.scrollTo(0, 0);
                });
            });
            document.querySelectorAll('#positionOptions .filter-option').forEach(opt => {
                opt.removeEventListener('click', opt._clickHandler);
                opt.addEventListener('click', opt._clickHandler = () => { let val = opt.dataset.value; activeFilters.position = (activeFilters.position === val) ? "" : val; updateFilterUI(); renderList(); });
            });
            document.querySelectorAll('#specialtyOptions .filter-option').forEach(opt => {
                opt.removeEventListener('click', opt._clickHandler);
                opt.addEventListener('click', opt._clickHandler = () => { let val = opt.dataset.value; activeFilters.specialty = (activeFilters.specialty === val) ? "" : val; updateFilterUI(); renderList(); });
            });
            document.querySelectorAll('#qualityOptions .quality-option').forEach(opt => {
                opt.removeEventListener('click', opt._clickHandler);
                opt.addEventListener('click', opt._clickHandler = () => { let val = opt.dataset.value; activeFilters.quality = (activeFilters.quality === val) ? "" : val; updateFilterUI(); renderList(); });
            });
            const dropdownBtn = document.getElementById('categoryDropdownBtn');
            const dropdownPanel = document.getElementById('categoryDropdownPanel');
            if (dropdownBtn && dropdownPanel) {

                dropdownBtn.addEventListener('click', dropdownBtn._clickHandler = (e) => { e.stopPropagation(); dropdownPanel.classList.toggle('show'); dropdownBtn.classList.toggle('active'); });
                document.removeEventListener('click', document._closeDropdown);
                document._closeDropdown = () => { dropdownPanel.classList.remove('show'); dropdownBtn.classList.remove('active'); };

            document.querySelectorAll('#desktopPositionOptions .desktop-filter-option').forEach(opt => {
                opt.removeEventListener('click', opt._clickHandler);
                opt.addEventListener('click', opt._clickHandler = () => { let val = opt.dataset.value; activeFilters.position = (activeFilters.position === val) ? "" : val; updateDesktopFilterUI(); renderList(); });
            });
            document.querySelectorAll('#desktopSpecialtyOptions .desktop-filter-option').forEach(opt => {
                opt.removeEventListener('click', opt._clickHandler);
                opt.addEventListener('click', opt._clickHandler = () => { let val = opt.dataset.value; activeFilters.specialty = (activeFilters.specialty === val) ? "" : val; updateDesktopFilterUI(); renderList(); });
            });
            document.querySelectorAll('#desktopQualityOptions .desktop-quality-option').forEach(opt => {
                opt.removeEventListener('click', opt._clickHandler);
                opt.addEventListener('click', opt._clickHandler = () => { let val = opt.dataset.value; activeFilters.quality = (activeFilters.quality === val) ? "" : val; updateDesktopFilterUI(); renderList(); });
            });
            updateDesktopFilterUI();
        }
    }
    
    function updateFilterUI() {
        document.querySelectorAll('#positionOptions .filter-option').forEach(opt => { if (opt.dataset.value === activeFilters.position) opt.classList.add('active'); else opt.classList.remove('active'); });
        document.querySelectorAll('#specialtyOptions .filter-option').forEach(opt => { if (opt.dataset.value === activeFilters.specialty) opt.classList.add('active'); else opt.classList.remove('active'); });

        document.querySelectorAll('#desktopSpecialtyOptions .desktop-filter-option').forEach(opt => { if (opt.dataset.value === activeFilters.specialty) opt.classList.add('active'); else opt.classList.remove('active'); });

        document.querySelectorAll('#detailPositionOptions .desktop-filter-option').forEach(opt => {
            opt.removeEventListener('click', opt._clickHandler);
            opt.addEventListener('click', opt._clickHandler = () => { let val = opt.dataset.value; activeFilters.position = (activeFilters.position === val) ? "" : val; updateDetailFilterUI(); renderList(); if (isDetail) restoreList(); });
        });
        document.querySelectorAll('#detailSpecialtyOptions .desktop-filter-option').forEach(opt => {
            opt.removeEventListener('click', opt._clickHandler);
            opt.addEventListener('click', opt._clickHandler = () => { let val = opt.dataset.value; activeFilters.specialty = (activeFilters.specialty === val) ? "" : val; updateDetailFilterUI(); renderList(); if (isDetail) restoreList(); });
        });
        document.querySelectorAll('#detailQualityOptions .desktop-quality-option').forEach(opt => {
            opt.removeEventListener('click', opt._clickHandler);
            opt.addEventListener('click', opt._clickHandler = () => { let val = opt.dataset.value; activeFilters.quality = (activeFilters.quality === val) ? "" : val; updateDetailFilterUI(); renderList(); if (isDetail) restoreList(); });
        });
        const detailSearchInput = document.getElementById('detailSearchInput');
        if (detailSearchInput) {
            detailSearchInput.removeEventListener('input', detailSearchInput._detailHandler);
            detailSearchInput._detailHandler = (e) => { performRealtimeSearch(e.target.value); };
            detailSearchInput.addEventListener('input', detailSearchInput._detailHandler);
        }
    }
    
    function updateDetailFilterUI() {
        document.querySelectorAll('#detailPositionOptions .desktop-filter-option').forEach(opt => { if (opt.dataset.value === activeFilters.position) opt.classList.add('active'); else opt.classList.remove('active'); });
        document.querySelectorAll('#detailSpecialtyOptions .desktop-filter-option').forEach(opt => { if (opt.dataset.value === activeFilters.specialty) opt.classList.add('active'); else opt.classList.remove('active'); });
        document.querySelectorAll('#detailQualityOptions .desktop-quality-option').forEach(opt => { if (opt.dataset.value === activeFilters.quality) opt.classList.add('active'); else opt.classList.remove('active'); });
    }
    
    function showDetail(id) {
        let car = vehiclesData.find(v => v.id === id);
        if (!car) return;
        isDetail = true;
        const url = new URL(window.location.href);
        url.searchParams.set('car', id);
        history.pushState({ page: 'detail', carId: id }, '', url);
        let stats = car.stats, chipSlots = car.chipSlots.map(t => CHIP_ICONS[t]), bgClass = getQualityClass(car.quality);
        let positionIcon = POSITION_ICONS[car.position] || POSITION_ICONS["辅助"];
        let specialtyIcon = SPECIALTY_ICONS[car.specialty] || SPECIALTY_ICONS["场地"];
        let ultDesc = formatSkillText(car.skills.ult.desc), recuDesc = formatSkillText(car.skills.ult.recu), passiveDesc = formatSkillText(car.skills.passive.desc);
        let ultPassiveBlock = car.skills.ult.ultPassive ? `<div class="sub-skill"><div class="sub-skill-title">解锁大招被动</div><div class="sub-skill-desc">${formatSkillText(car.skills.ult.ultPassive)}</div></div>` : '';
        let featuresHtml = (car.skills.features && car.skills.features.length) ? car.skills.features.map(f => `<div class="feature-box" data-desc="${(f.desc || '').replace(/"/g, '&quot;')}" data-name="${f.name}" data-color="${f.color || '默认'}">${f.name}</div>`).join('') : '<div style="color:#8a8aa3; padding:10px;">暂无特点数据</div>';
        let spBlockHtml = '';
        if (car.sp) { let spDesc = formatSkillText(car.sp.desc); spBlockHtml = `<div class="skill-block"><div class="skill-header"><div class="skill-icon"><img src="${car.sp.icon}"></div><div class="skill-title">SP：${car.sp.name}</div></div><div class="skill-desc"><div class="sp-cooltime">冷却时间：${car.sp.cooltime}</div>${spDesc}</div></div>`; }
        let html = `<div class="detail-container">
            <div class="detail-header-actions">
                <button class="detail-back-btn" id="backBtn">← 返回列表</button>
                <div class="detail-search-wrapper">${buildDetailSearchBarHTML()}</div>
            </div>
            <div class="detail-header"><div class="detail-image ${bgClass}"><img src="${car.imageUrl}" onerror="this.src='https://placehold.co/600x400?text=Car'"><div class="detail-acquisition-area"><div class="detail-acquisition-icon"><img src="${car.acquisitionIcon}"></div><span class="detail-acquisition-text">${car.acquisition}</span></div></div>
            <div class="detail-info-panel"><div class="detail-name">${car.name}</div><div class="detail-badges"><span class="quality-badge-large">${car.quality}</span><div class="badge"><img src="${positionIcon}"> ${car.position}位</div><div class="badge"><img src="${specialtyIcon}"> ${car.specialty}</div></div>
            <div class="info-rows"><div class="info-row"><span class="info-label">注册日期</span><span class="info-value">${car.registerDate || '未知'}</span></div><div class="info-row"><span class="info-label">车辆类型</span><span class="info-value">${car.vehicleType || '未知'}</span></div><div class="info-row"><span class="info-label">厂商</span><span class="info-value">${car.manufacturer || '未知'}</span></div></div></div></div>
            <div class="features-section"><div class="section-title">车辆特点</div><div class="features-horizontal">${featuresHtml}</div></div>
            <div class="chip-slots"><div class="section-title">芯片槽</div><div class="chip-icons">${chipSlots.map(icon => `<div class="chip-icon"><img src="${icon}"></div>`).join('')}</div></div>
            <div class="chip-workshop"><div class="workshop-title">芯片要求搭配</div><div class="workshop-placeholder">芯片要求搭配（配合赋能版）预留区<p>后续版本将展示社区高玩芯片组合、赋能推荐以及AI智能搭配方案</p></div></div>
            <div class="vehicle-stats"><div class="section-title">车辆基础数据</div><div class="stats-grid">
                <div class="stat-card"><span>极速</span><span>${stats.topSpeed}</span></div><div class="stat-card"><span>动力</span><span>${stats.power}</span></div><div class="stat-card"><span>耐久</span><span>${stats.durability}</span></div>
                <div class="stat-card"><span>氮气充能</span><span class="gold-number">${stats.nitroCharge}</span></div><div class="stat-card"><span>起步充能</span><span class="gold-number">${stats.startCharge}</span></div><div class="stat-card"><span>氮气时长</span><span>${stats.nitroDuration}</span></div>
                <div class="stat-card"><span>氮气极速</span><span><span class="blue">${stats.nitroSpeed.blue}</span> / <span class="purple">${stats.nitroSpeed.purple}</span></span></div>
                <div class="stat-card"><span>涡轮时长</span><span><span class="blue">${stats.turboDuration.blue}</span> / <span class="purple">${stats.turboDuration.purple}</span></span></div>
                <div class="stat-card"><span>涡轮极速</span><span><span class="blue">${stats.turboSpeed.blue}</span> / <span class="purple">${stats.turboSpeed.purple}</span></span></div>
                <div class="stat-card"><span>大招动力</span><span>${stats.ultPower}</span></div>
            </div></div>
            <div class="skills-section"><div class="skill-block"><div class="skill-header"><div class="skill-icon"><img src="${car.ultIcon}"></div><div class="skill-title">大招：${car.skills.ult.name}</div></div><div class="skill-desc">${ultDesc}</div><div class="sub-skill"><div class="sub-skill-title">RECU限制解除（8级解锁）</div><div class="sub-skill-desc">${recuDesc}</div></div>${ultPassiveBlock}</div>
            <div class="skill-block"><div class="skill-header"><div class="skill-icon"><img src="${car.passiveIcon}"></div><div class="skill-title">被动：${car.skills.passive.name}</div></div><div class="skill-desc">${passiveDesc}</div></div>${spBlockHtml}</div></div>`;
        let vehiclesPage = document.getElementById("vehiclesPage");
        vehiclesPage.innerHTML = html;
        document.getElementById("backBtn")?.addEventListener("click", restoreList);
        bindDetailFilters();
        const mobile = isMobileDevice();
        bindTermAndFeatureEvents(mobile);
        clearAllSearchBoxes();
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        vehiclesPage.classList.add('active-page');
        window.scrollTo(0, 0);
    }
    
    // 手机端返回键逻辑优化：当在车辆主界面时按返回键则退出网站（或回到上一页）
    // 通过监听 popstate 和 自定义返回按钮已处理，但手机端实体返回键需要单独处理
    function handleMobileBackButton() {
        if (isMobileDevice()) {
            // 监听浏览器的后退事件
            window.addEventListener('popstate', function(e) {
                // 如果当前不在详情页（即主界面），并且没有待恢复的详情状态，则退出网站
                if (!isDetail && document.getElementById('vehiclesPage').classList.contains('active-page')) {
                    // 阻止默认后退行为，关闭当前页面或回到上一级
                    history.pushState(null, null, location.href);
                    // 尝试退出：如果是 WebView 可关闭，否则提示
                    if (window.confirm('确定要退出王牌竞速情报站吗？')) {
                        window.close();
                        // 如果 window.close 无效，尝试后退到空白页
                        setTimeout(() => { history.back(); }, 100);
                    }
                }
            });
            // 防止进入页面后直接后退导致退出误判，先添加一个历史记录
            history.pushState(null, null, location.href);
        }
    }
    
    window.addEventListener('popstate', function(e) {
        if (isDetail) {
            restoreList();
        } else {
            let carId = new URLSearchParams(window.location.search).get('car');
            if (carId && vehiclesData.find(v => v.id === carId)) {
                showDetail(carId);
            } else {
                // 手机端主界面时处理退出逻辑已在 handleMobileBackButton 中实现
                if (isMobileDevice() && document.getElementById('vehiclesPage').classList.contains('active-page')) {
                    // 不做额外处理，避免重复提示
                }
            }
        }
    });
    
    function restoreList() {
        const cleanUrl = window.location.pathname;
        history.pushState({ page: 'list' }, '', cleanUrl);
        let vehiclesPage = document.getElementById("vehiclesPage");
        vehiclesPage.innerHTML = `<div class="desktop-filter-bar" id="desktopGlobalFilterBar">
                <div class="search-box"><input type="text" id="searchInputDesktop" placeholder="搜索车辆名称、简称、技能..."></div>
                <div class="desktop-filter-sections">
                    <div class="desktop-filter-section"><div class="desktop-filter-section-title">定位</div><div class="desktop-filter-options" id="desktopPositionOptions">
                        <div class="desktop-filter-option" data-type="position" data-value="辅助"><img src="https://s3.bmp.ovh/2026/05/31/mtc05q5R.png" alt="辅助"> 辅助</div>
                        <div class="desktop-filter-option" data-type="position" data-value="竞速"><img src="https://s3.bmp.ovh/2026/05/31/7k3ksZ5K.png" alt="竞速"> 竞速</div>
                        <div class="desktop-filter-option" data-type="position" data-value="干扰"><img src="https://s3.bmp.ovh/2026/05/31/yoQTZbOL.png" alt="干扰"> 干扰</div>
                        <div class="desktop-filter-option" data-type="position" data-value="天平"><img src="https://s3.bmp.ovh/2026/05/31/S38JRfCL.png" alt="天平"> 天平</div>
                    </div></div>
                    <div class="desktop-filter-section"><div class="desktop-filter-section-title">专精</div><div class="desktop-filter-options" id="desktopSpecialtyOptions">
                        <div class="desktop-filter-option" data-type="specialty" data-value="城市"><img src="https://s3.bmp.ovh/2026/05/31/nNwRnfQf.png" alt="城市"> 城市</div>
                        <div class="desktop-filter-option" data-type="specialty" data-value="山路"><img src="https://s3.bmp.ovh/2026/05/31/2y6MiwXC.png" alt="山路"> 山路</div>
                        <div class="desktop-filter-option" data-type="specialty" data-value="场地"><img src="https://s3.bmp.ovh/2026/05/31/qGyMY5a6.png" alt="场地"> 场地</div>
                    </div></div>
                    <div class="desktop-filter-section"><div class="desktop-filter-section-title">品质</div><div class="desktop-filter-options" id="desktopQualityOptions">
                        <div class="desktop-quality-option" data-type="quality" data-value="传说">传说</div>
                        <div class="desktop-quality-option" data-type="quality" data-value="史诗">史诗</div>
                        <div class="desktop-quality-option" data-type="quality" data-value="稀有">稀有</div>
                        <div class="desktop-quality-option" data-type="quality" data-value="普通">普通</div>
                    </div></div>
                </div>
            </div>
            <div class="mobile-fixed-header" id="mobileFixedHeader" style="display: none;">
                <div class="mobile-top-bar"><div class="mobile-logo-area" onclick="location.reload()"><h1>王牌竞速 · 情报站</h1><p>核心档案 · 赛车数据</p></div>
                <div class="mobile-nav-tabs" id="mobileNavTabs">
                    <button class="mobile-tab-btn active" data-page="vehicles">车辆数据</button>
                    <button class="mobile-tab-btn" data-page="chip">芯片架构</button>
                    <button class="mobile-tab-btn" data-page="energy">赋能系统</button>
                    <button class="mobile-tab-btn" data-page="calculator">芯片要求计算器</button>
                    <button class="mobile-tab-btn" data-page="news">爆料信息</button>
                    <button class="mobile-tab-btn" data-page="wallpaper">游戏壁纸</button>
                </div></div>
                <div class="mobile-filter-sticky"><div class="filter-row"><div class="search-box"><input type="text" id="searchInputMobile" placeholder="搜索车辆名称、简称、技能..."></div>
                <div class="category-dropdown-btn" id="categoryDropdownBtn"><span>选择分类</span><span class="arrow">▼</span></div></div>
                <div class="category-dropdown-panel" id="categoryDropdownPanel">
                    <div class="filter-section"><div class="filter-section-title">定位</div><div class="filter-options" id="positionOptions">
                        <div class="filter-option" data-type="position" data-value="辅助"><img src="https://s3.bmp.ovh/2026/05/31/mtc05q5R.png" alt="辅助"> 辅助</div>
                        <div class="filter-option" data-type="position" data-value="竞速"><img src="https://s3.bmp.ovh/2026/05/31/7k3ksZ5K.png" alt="竞速"> 竞速</div>
                        <div class="filter-option" data-type="position" data-value="干扰"><img src="https://s3.bmp.ovh/2026/05/31/yoQTZbOL.png" alt="干扰"> 干扰</div>
                        <div class="filter-option" data-type="position" data-value="天平"><img src="https://s3.bmp.ovh/2026/05/31/S38JRfCL.png" alt="天平"> 天平</div>
                    </div></div>
                    <div class="filter-section"><div class="filter-section-title">专精</div><div class="filter-options" id="specialtyOptions">
                        <div class="filter-option" data-type="specialty" data-value="城市"><img src="https://s3.bmp.ovh/2026/05/31/nNwRnfQf.png" alt="城市"> 城市</div>
                        <div class="filter-option" data-type="specialty" data-value="山路"><img src="https://s3.bmp.ovh/2026/05/31/2y6MiwXC.png" alt="山路"> 山路</div>
                        <div class="filter-option" data-type="specialty" data-value="场地"><img src="https://s3.bmp.ovh/2026/05/31/qGyMY5a6.png" alt="场地"> 场地</div>
                    </div></div>
                    <div class="filter-section"><div class="filter-section-title">品质</div><div class="filter-options" id="qualityOptions">
                        <div class="quality-option" data-type="quality" data-value="传说">传说</div>
                        <div class="quality-option" data-type="quality" data-value="史诗">史诗</div>
                        <div class="quality-option" data-type="quality" data-value="稀有">稀有</div>
                        <div class="quality-option" data-type="quality" data-value="普通">普通</div>
                    </div></div>
                </div></div>
            </div>
            <div class="cars-grid" id="carsGrid"></div><div class="stats-text" id="statsText">加载中...</div>`;
        initFilters();
        attachSearchInputEvents();
        renderList();
        isDetail = false;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        vehiclesPage.classList.add('active-page');
        window.scrollTo(0, 0);
    }
    
    function initTabs() {
        document.querySelectorAll('.sidebar .tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                let pageId = btn.dataset.page;
                if (pageId === 'vehicles' && isDetail) restoreList();
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
                document.getElementById(pageId + 'Page')?.classList.add('active-page');
                document.querySelectorAll('.sidebar .tab-btn').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                if (pageId !== 'vehicles') isDetail = false;
                if (pageId === 'vehicles') window.scrollTo(0, 0);
            });
        });
    }
    
    initTabs();
    loadData();
    handleMobileBackButton();
</script>
</body>
</html>
