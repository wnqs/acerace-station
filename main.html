<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>王牌竞速 · 情报站</title>
    <style>
        /* ========== 基础样式保持不变 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        input, textarea {
            user-select: text;
            caret-color: auto;
        }
        
        body { background: #0a0a0f; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        
        /* 电脑端样式 */
        @media (min-width: 769px) {
            body {
                background: linear-gradient(135deg, #0a0a0f 0%, #0f0f1a 25%, #141425 50%, #0f0f1a 75%, #0a0a0f 100%);
                background-attachment: fixed;
            }
            body::before {
                content: '';
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-image: 
                    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
                background-size: 40px 40px;
                pointer-events: none;
                z-index: 0;
            }
            .sidebar {
                background: rgba(15, 15, 23, 0.75);
                backdrop-filter: blur(10px);
                border-right: 1px solid rgba(42, 42, 60, 0.6);
            }
            .sidebar .logo-area {
                border-bottom: 1px solid rgba(42, 42, 60, 0.6);
            }
            .tab-btn.active {
                background: rgba(42, 42, 60, 0.8);
            }
            .tab-btn:hover:not(.active) {
                background: rgba(31, 31, 46, 0.6);
            }
            .desktop-header {
                background: rgba(15, 15, 23, 0.7);
                backdrop-filter: blur(12px);
                border-bottom: 1px solid rgba(42, 42, 60, 0.5);
                border-radius: 0 0 20px 20px;
                margin-bottom: 24px;
            }
            .desktop-filter-bar {
                background: rgba(20, 20, 31, 0.6);
                backdrop-filter: blur(8px);
                border: 1px solid rgba(42, 42, 60, 0.5);
            }
            .search-box input {
                border: 1px solid rgba(42, 42, 60, 0.8);
                background: rgba(31, 31, 46, 0.8);
            }
            .desktop-filter-option, .desktop-quality-option {
                background: rgba(42, 42, 60, 0.7);
            }
            .car-card, .chip-card {
                background: rgba(20, 20, 31, 0.85);
                backdrop-filter: blur(4px);
                border: 2px solid rgba(42, 42, 60, 0.5);
            }
            .car-card:hover, .chip-card:hover {
                transform: translateY(-4px);
                border-color: rgba(254, 202, 87, 0.4);
            }
            .card-info {
                background: rgba(20, 20, 31, 0.7);
                backdrop-filter: blur(4px);
            }
            .detail-container {
                background: rgba(20, 20, 31, 0.85);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(42, 42, 60, 0.6);
            }
            .detail-info-panel {
                background: rgba(15, 15, 26, 0.7);
                backdrop-filter: blur(10px);
            }
            .feature-box, .skill-desc, .sub-skill, .stat-card, .info-row, .chip-icon, .workshop-placeholder {
                background: rgba(0, 0, 0, 0.3);
            }
            .chip-card.legendary-border:hover { border-color: #e6b422; box-shadow: 0 0 16px rgba(230,180,34,0.4); }
            .chip-card.epic-border:hover { border-color: #aa6dc9; box-shadow: 0 0 14px rgba(170,109,201,0.35); }
            .chip-card.rare-border:hover { border-color: #4a9eff; box-shadow: 0 0 12px rgba(74,158,255,0.3); }
            .chip-card.normal-border:hover { border-color: #40c468; box-shadow: 0 0 10px rgba(64,196,104,0.25); }
        }
        
        .app-layout { display: flex; max-width: 1600px; margin: 0 auto; min-height: 100vh; position: relative; z-index: 1; }
        .sidebar { width: 240px; background: #0f0f17; border-right: 1px solid #2a2a3c; padding: 24px 0; position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; z-index: 100; }
        .sidebar .logo-area { padding: 0 16px 20px 16px; border-bottom: 1px solid #2a2a3c; margin-bottom: 20px; cursor: pointer; }
        .sidebar .logo-area h1 { font-size: 1.2rem; background: linear-gradient(135deg, #ff6b6b, #feca57); -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: 800; }
        .sidebar .logo-area p { font-size: 0.6rem; color: #8a8aa3; margin-top: 4px; font-weight: 500; }
        .nav-tabs { display: flex; flex-direction: column; gap: 6px; padding: 0 12px; width: 100%; }
        .tab-btn { padding: 12px 16px; border: none; background: transparent; border-radius: 12px; font-size: 0.9rem; cursor: pointer; color: #a0a0b8; transition: 0.2s; text-align: left; font-weight: 700; width: 100%; }
        .tab-btn.active { background: #2a2a3c; color: #feca57; }
        .tab-btn:hover:not(.active) { background: #1f1f2e; color: #e2e2e6; }
        
        .main-content { flex: 1; margin-left: 240px; padding: 0 24px 60px 24px; width: calc(100% - 240px); }
        .page { display: none; }
        .page.active-page { display: block; }
        
        /* 车辆数据原有样式 */
        .desktop-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #0f0f17;
            padding: 4px 0 0 0;
            border-bottom: 1px solid #2a2a3c;
            margin-bottom: 24px;
        }
        .desktop-header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 0 6px 0;
        }
        .header-title-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .page-title {
            font-size: 1rem;
            font-weight: 700;
            color: #e2e2e6;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .detail-back-btn-header {
            display: inline-block;
            background: #1f1f2e;
            border: none;
            padding: 4px 14px;
            border-radius: 40px;
            cursor: pointer;
            color: #feca57;
            font-size: 0.75rem;
            font-weight: 700;
            transition: 0.2s;
        }
        .detail-back-btn-header:hover {
            background: #feca57;
            color: #1a1a2e;
            transform: scale(1.02);
        }
        .header-right-placeholder {
            width: 80px;
        }
        
        .desktop-filter-bar {
            background: #14141f;
            border-radius: 20px;
            padding: 16px 20px;
            backdrop-filter: blur(8px);
            border: 1px solid #2a2a3c;
            margin-bottom: 0;
        }
        .search-box { margin-bottom: 16px; }
        .search-box input { 
            width: 100%; 
            max-width: 400px; 
            padding: 10px 16px; 
            border-radius: 40px; 
            border: 1px solid #2a2a3c; 
            background: #1f1f2e; 
            color: #e2e2e6; 
            font-size: 0.9rem; 
            font-weight: 500;
            outline: none;
        }
        .search-box input:focus {
            border-color: #feca57;
        }
        .desktop-filter-sections {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }
        .desktop-filter-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .desktop-filter-section-title {
            font-size: 0.75rem;
            color: #feca57;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .desktop-filter-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .desktop-filter-option {
            background: #2a2a3c;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 0.75rem;
            cursor: pointer;
            color: #a0a0b8;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            font-weight: 600;
        }
        .desktop-filter-option.active {
            background: #feca57;
            color: #1a1a2e;
        }
        .desktop-filter-option img {
            width: 16px;
            height: 16px;
        }
        .desktop-quality-option {
            background: #2a2a3c;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
            color: #a0a0b8;
        }
        .desktop-quality-option.active {
            background: #feca57;
            color: #1a1a2e;
        }
        
        .cars-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
        .car-card { background: #14141f; border-radius: 24px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; will-change: transform; position: relative; display: flex; flex-direction: column; }
        .car-card:hover { transform: translateY(-4px); }
        @media (hover: hover) and (pointer: fine) {
            .car-card.legendary-border:hover { border-color: #e6b422; box-shadow: 0 0 16px rgba(230,180,34,0.4); }
            .car-card.epic-border:hover { border-color: #aa6dc9; box-shadow: 0 0 14px rgba(170,109,201,0.35); }
            .car-card.rare-border:hover { border-color: #4a9eff; box-shadow: 0 0 12px rgba(74,158,255,0.3); }
            .car-card.normal-border:hover { border-color: #40c468; box-shadow: 0 0 10px rgba(64,196,104,0.25); }
        }
        
        .card-image { height: 180px; display: flex; align-items: center; justify-content: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); position: relative; overflow: hidden; flex-shrink: 0; }
        .card-image.legendary { background: linear-gradient(145deg, #1a1208 0%, #0d0a05 100%); }
        .card-image.legendary::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,215,0,0.04) 2px, rgba(255,215,0,0.04) 4px); pointer-events: none; }
        .card-image.legendary::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 20% 30%, rgba(255,215,0,0.12), transparent 70%); pointer-events: none; }
        .card-image.epic { background: linear-gradient(145deg, #1a0f1a 0%, #0d050d 100%); }
        .card-image.epic::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(156,39,176,0.08) 2px, rgba(156,39,176,0.08) 4px); pointer-events: none; }
        .card-image.epic::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 25% 35%, rgba(156,39,176,0.15), rgba(255,215,0,0.05) 60%, transparent 80%); pointer-events: none; }
        .card-image.rare { background: linear-gradient(145deg, #0e1a2a 0%, #060d15 100%); }
        .card-image.rare::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(33,150,243,0.06) 2px, rgba(33,150,243,0.06) 4px); pointer-events: none; }
        .card-image.rare::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 40% 60%, rgba(33,150,243,0.12), transparent 70%); pointer-events: none; }
        .card-image.normal { background: linear-gradient(145deg, #1a2a1a 0%, #0a1a0a 100%); }
        .card-image.normal::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(76,175,80,0.08) 2px, rgba(76,175,80,0.08) 4px); pointer-events: none; }
        .card-image.normal::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 30% 30%, rgba(76,175,80,0.12), transparent 70%); pointer-events: none; }
        .card-image img { max-width: 100%; max-height: 100%; object-fit: contain; position: relative; z-index: 2; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4)); }
        
        .acquisition-icon { position: absolute; bottom: 12px; right: 12px; width: 64px; height: 64px; cursor: pointer; z-index: 10; transition: transform 0.2s; background: transparent; border-radius: 0; }
        .acquisition-icon:hover { transform: scale(1.08); }
        .acquisition-icon img { width: 100%; height: 100%; object-fit: contain; }
        
        .quality-badge-wrapper { position: absolute; bottom: 12px; right: 12px; z-index: 15; }
        .quality-badge { font-size: 0.7rem; padding: 3px 12px; border-radius: 30px; font-weight: 800; letter-spacing: 1px; backdrop-filter: blur(2px); text-transform: uppercase; transition: none; border-width: 1px; border-style: solid; display: inline-block; transform: translateZ(0); white-space: nowrap; }
        .quality-badge.legendary { background: linear-gradient(135deg, #e6b422, #c49b1a); color: #ffffff !important; border-color: #ffd966; box-shadow: 0 2px 12px rgba(230,180,34,0.4); text-shadow: 0 1px 1px rgba(0,0,0,0.3); }
        .quality-badge.epic { background: linear-gradient(135deg, #aa6dc9, #8b5aaf); color: #ffffff; border-color: #c99eff; box-shadow: 0 2px 12px rgba(170,109,201,0.4); text-shadow: 0 1px 1px rgba(0,0,0,0.3); }
        .quality-badge.rare { background: linear-gradient(135deg, #4a9eff, #2d7fd1); color: #ffffff; border-color: #8bcbff; box-shadow: 0 2px 12px rgba(74,158,255,0.35); text-shadow: 0 1px 1px rgba(0,0,0,0.3); }
        .quality-badge.normal { background: linear-gradient(135deg, #40c468, #2f9e52); color: #ffffff; border-color: #8fdfaa; box-shadow: 0 2px 12px rgba(64,196,104,0.3); text-shadow: 0 1px 1px rgba(0,0,0,0.3); }
        
        .card-info { padding: 16px; background: rgba(20,20,31,0.9); }
        .car-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; flex-wrap: wrap; }
        .car-name { font-size: 1.1rem; font-weight: 700; color: #e2e2e6; flex-shrink: 1; word-break: break-word; }
        .car-meta { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
        .meta-item { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.08); padding: 4px 10px; border-radius: 40px; font-size: 0.7rem; color: #a0a0b8; font-weight: 500; }
        .meta-item img { width: 18px; height: 18px; }
        .car-description { font-size: 0.75rem; color: #8a8aa3; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 10px; line-height: 1.4; font-weight: 400; }
        .stats-text { text-align: center; padding: 16px; color: #8a8aa3; font-weight: 500; }
        
        /* 芯片页面样式 */
        .chip-header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .chip-title {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #feca57, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .chip-search-box {
            width: 280px;
        }
        .chip-search-box input {
            width: 100%;
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid #2a2a3c;
            background: #1f1f2e;
            color: #e2e2e6;
            font-size: 0.9rem;
            font-weight: 500;
            outline: none;
        }
        .chip-search-box input:focus {
            border-color: #feca57;
        }
        .chip-filter-bar {
            background: #14141f;
            border-radius: 20px;
            padding: 16px 20px;
            backdrop-filter: blur(8px);
            border: 1px solid #2a2a3c;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
        }
        .chip-filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chip-filter-label {
            font-size: 0.75rem;
            color: #feca57;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .chip-filter-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .chip-filter-option {
            background: #2a2a3c;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 0.75rem;
            cursor: pointer;
            color: #a0a0b8;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
            font-weight: 600;
        }
        .chip-filter-option.active {
            background: #feca57;
            color: #1a1a2e;
        }
        
        .chips-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }
        .chip-card {
            background: #14141f;
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .chip-card.legendary-border { border-color: #e6b422; }
        .chip-card.epic-border { border-color: #aa6dc9; }
        .chip-card.rare-border { border-color: #4a9eff; }
        .chip-card.normal-border { border-color: #40c468; }
        
        .chip-image {
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            background: linear-gradient(145deg, #1a1a2a, #0f0f1a);
        }
        .chip-image img {
            max-width: 100%;
            max-height: 120px;
            object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
        }
        .chip-info {
            padding: 16px;
        }
        .chip-name {
            font-size: 1rem;
            font-weight: 700;
            color: #e2e2e6;
            margin-bottom: 8px;
        }
        .chip-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .chip-meta-tag {
            background: rgba(255,255,255,0.08);
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.65rem;
            color: #a0a0b8;
            font-weight: 500;
        }
        .chip-effect {
            font-size: 0.75rem;
            color: #8a8aa3;
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 10px;
            line-height: 1.4;
        }
        .chip-effect strong {
            color: #feca57;
        }
        .chip-desc {
            font-size: 0.7rem;
            color: #6a6a82;
            margin-top: 8px;
            font-style: italic;
        }
        
        /* 手机端保持原样 */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .mobile-fixed-header {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                background: #0f0f17;
                border-bottom: 1px solid #2a2a3c;
                z-index: 200;
                display: flex;
                flex-direction: column;
            }
            .mobile-top-bar { padding: 8px 12px; border-bottom: 1px solid #2a2a3c; }
            .mobile-logo-area { text-align: center; cursor: pointer; padding-bottom: 2px; }
            .mobile-logo-area h1 { font-size: 1rem; background: linear-gradient(135deg, #ff6b6b, #feca57); -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: 800; }
            .mobile-logo-area p { font-size: 0.5rem; color: #8a8aa3; font-weight: 500; }
            .mobile-nav-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-top: 4px; }
            .mobile-tab-btn { padding: 6px 2px; font-size: 0.65rem; border-radius: 16px; text-align: center; background: #1a1a2a; border: none; cursor: pointer; color: #a0a0b8; font-weight: 700; }
            .mobile-tab-btn.active { background: #feca57; color: #1a1a2e; }
            .mobile-filter-sticky { padding: 8px 12px; background: #0a0a0f; border-bottom: 1px solid #2a2a3c; }
            .filter-row { display: flex; gap: 8px; align-items: center; }
            .search-box { flex: 2; margin-bottom: 0; width: auto; }
            .search-box input { width: 100%; padding: 8px 12px; font-size: 0.8rem; background: #1f1f2e; border: 1px solid #2a2a3c; border-radius: 30px; color: #e2e2e6; outline: none; }
            .search-box input:focus { border-color: #feca57; }
            .category-dropdown-btn { background: #1f1f2e; border: 1px solid #2a2a3c; border-radius: 30px; padding: 6px 14px; font-size: 0.75rem; cursor: pointer; color: #e2e2e6; display: flex; align-items: center; gap: 5px; white-space: nowrap; font-weight: 700; flex-shrink: 0; }
            .category-dropdown-btn .arrow { font-size: 0.6rem; transition: transform 0.2s; }
            .category-dropdown-btn.active .arrow { transform: rotate(180deg); }
            .category-dropdown-panel { background: #1a1a2a; border-radius: 16px; margin-top: 8px; padding: 10px; border: 1px solid #2a2a3c; display: none; position: absolute; left: 12px; right: 12px; z-index: 210; }
            .category-dropdown-panel.show { display: block; }
            .filter-section { margin-bottom: 12px; }
            .filter-section-title { font-size: 0.65rem; color: #feca57; margin-bottom: 5px; padding-left: 4px; font-weight: 700; }
            .filter-options { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-start; }
            .filter-option, .quality-option { background: #2a2a3c; border-radius: 30px; padding: 6px 12px; font-size: 0.7rem; cursor: pointer; color: #a0a0b8; font-weight: 600; }
            .filter-option.active, .quality-option.active { background: #feca57; color: #1a1a2e; }
            .main-content { margin-left: 0; margin-top: 0; padding: 12px; width: 100%; }
            body.has-fixed-header .main-content { margin-top: 145px; }
            .cars-grid, .chips-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .card-image, .chip-image { height: 130px; padding: 12px; }
            .car-name { font-size: 0.85rem; }
            .chip-header-area { flex-direction: column; align-items: stretch; }
            .chip-search-box { width: 100%; }
            .chip-filter-bar { flex-direction: column; gap: 16px; }

<script>
    // ========== 车辆数据相关变量（保持不变） ==========
    let vehiclesData = [];
    let termDefinitions = {};
    let activeFilters = { position: "", specialty: "", quality: "" };
    let keyword = "";
    let activeTooltipTimer = null;
    let currentTooltipElement = null;
    let searchDebounceTimer = null;
    
    const EXTRA_RACING_ICON_CARS = ["女武神"];
    const RACING_ICON_URL = "https://s3.bmp.ovh/2026/05/31/7k3ksZ5K.png";
    const qualityWeight = { "传说": 4, "史诗": 3, "稀有": 2, "普通": 1 };
    const positionWeight = { "竞速": 3, "辅助": 2, "干扰": 1, "天平": 2 };
    const qualityOverrides = { "mini jcw": "稀有", "风神": "传说", "幻蝶": "传说" };
    
    const CHIP_ICONS = {
        circle: "https://s3.bmp.ovh/2026/05/31/OnUTepDT.png",
        triangle: "https://s3.bmp.ovh/2026/05/31/J5FiGMmt.png",
        rhombus: "https://s3.bmp.ovh/2026/05/31/pw68CH6t.png",
        hexagon: "https://s3.bmp.ovh/2026/05/31/2vWKj9Ev.png",
        vslot: "https://s3.bmp.ovh/2026/05/31/Guvt6llt.png"
    };
    const POSITION_ICONS = {
        "辅助": "https://s3.bmp.ovh/2026/05/31/mtc05q5R.png",
        "竞速": "https://s3.bmp.ovh/2026/05/31/7k3ksZ5K.png",
        "干扰": "https://s3.bmp.ovh/2026/05/31/yoQTZbOL.png",
        "天平": "https://s3.bmp.ovh/2026/05/31/S38JRfCL.png"
    };
    const SPECIALTY_ICONS = {
        "城市": "https://s3.bmp.ovh/2026/05/31/nNwRnfQf.png",
        "山路": "https://s3.bmp.ovh/2026/05/31/2y6MiwXC.png",
        "场地": "https://s3.bmp.ovh/2026/05/31/qGyMY5a6.png"
    };
    
    // ========== 芯片数据 ==========
    let chipsData = [];
    let chipFilters = { quality: "", shape: "", type: "" };
    let chipKeyword = "";
    
    function getChipBorderClass(quality) {
        if (quality === "传说") return "legendary-border";
        if (quality === "史诗") return "epic-border";
        if (quality === "稀有") return "rare-border";
        return "normal-border";
    }
    function getChipQualityClass(quality) {
        if (quality === "传说") return "legendary";
        if (quality === "史诗") return "epic";
        if (quality === "稀有") return "rare";
        return "normal";
    }
    
    function initChipFilters() {
        const qualities = ["传说", "史诗", "稀有", "普通"];
        const shapes = ["V型芯片", "核心芯片", "圆形芯片", "三角形芯片", "菱形芯片", "六边形芯片"];
        const types = ["扩展", "核心"];
        const qualityContainer = document.getElementById("chipQualityFilter");
        const shapeContainer = document.getElementById("chipShapeFilter");
        const typeContainer = document.getElementById("chipTypeFilter");
        if (!qualityContainer) return;
        qualityContainer.innerHTML = qualities.map(q => `<div class="chip-filter-option" data-filter="quality" data-value="${q}">${q}</div>`).join("");
        shapeContainer.innerHTML = shapes.map(s => `<div class="chip-filter-option" data-filter="shape" data-value="${s}">${s}</div>`).join("");
        typeContainer.innerHTML = types.map(t => `<div class="chip-filter-option" data-filter="type" data-value="${t}">${t}</div>`).join("");
        
        document.querySelectorAll(".chip-filter-option").forEach(opt => {
            opt.addEventListener("click", () => {
                const filterType = opt.dataset.filter;
                const value = opt.dataset.value;
                if (chipFilters[filterType] === value) chipFilters[filterType] = "";
                else chipFilters[filterType] = value;
                updateChipFilterUI();
                renderChipsList();
            });
        });
    }
    
    function updateChipFilterUI() {
        document.querySelectorAll(".chip-filter-option").forEach(opt => {
            const filterType = opt.dataset.filter;
            const value = opt.dataset.value;
            if (chipFilters[filterType] === value) opt.classList.add("active");
            else opt.classList.remove("active");
        });
    }
    
    function filterChips() {
        return chipsData.filter(chip => {
            if (chipFilters.quality && chip.quality !== chipFilters.quality) return false;
            if (chipFilters.shape && chip.shape !== chipFilters.shape) return false;
            if (chipFilters.type && chip.type !== chipFilters.type) return false;
            if (chipKeyword && !chip.name.toLowerCase().includes(chipKeyword.toLowerCase())) return false;
            return true;
        });
    }
    
    function renderChipsList() {
        const filtered = filterChips();
        const grid = document.getElementById("chipsGrid");
        const stats = document.getElementById("chipStatsText");
        if (!grid) return;
        if (filtered.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:60px; color:#8a8aa3;">暂无芯片数据</div>';
            stats.innerText = "共 0 个芯片";
            return;
        }
        grid.innerHTML = filtered.map(chip => {
            const borderClass = getChipBorderClass(chip.quality);
            const qualityClass = getChipQualityClass(chip.quality);
            const effectDesc = chip.effectDescription || "暂无效果描述";
            const effectNote = chip.effectNote ? `<div class="chip-desc">${chip.effectNote}</div>` : '<div class="chip-desc">暂无效果说明</div>';
            return `<div class="chip-card ${borderClass}">
                        <div class="chip-image"><img src="${chip.icon}" referrerpolicy="no-referrer" onerror="this.src='https://placehold.co/200x120?text=Chip'"></div>
                        <div class="chip-info">
                            <div class="chip-name">${chip.name}</div>
                            <div class="chip-meta"><span class="chip-meta-tag">${chip.shape}</span><span class="chip-meta-tag">${chip.type}</span></div>
                            <div class="chip-effect"><strong>效果：</strong>${effectDesc}</div>
                            ${effectNote}
                        </div>
                        <div class="quality-badge-wrapper"><span class="quality-badge ${qualityClass}">${chip.quality}</span></div>
                    </div>`;
        }).join("");
        stats.innerText = `共 ${filtered.length} 个芯片`;
    }
    
    // 从 chips.json 文件加载芯片数据
    async function loadChipsData() {
        try {
            const response = await fetch('./chips.json');
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: 无法加载 chips.json`);
            }
            const data = await response.json();
            if (data.chips && Array.isArray(data.chips)) {
                chipsData = data.chips;
            } else {
                throw new Error('chips.json 格式错误：缺少 chips 数组');
            }
        } catch (error) {
            console.error('[芯片数据加载错误]', error);
            // 使用默认数据作为后备
            chipsData = [
                {
                    id: "chip_mianmian",
                    name: "猫眠梦之芯",
                    icon: "https://s3.bmp.ovh/2026/05/29/iTqrWqI7.png",
                    quality: "传说",
                    shape: "V型芯片",
                    type: "扩展",
                    effectDescription: "每6秒获得1200集气量并恢复6点耐久值，大招达到90%能量即可使用（猫眠梦装备时改为66%）",
                    effectNote: "推荐大招阈值100%车辆携带，减少赋能压力"
                }
            ];
            const stats = document.getElementById("chipStatsText");
            if (stats) stats.innerText = "加载 chips.json 失败，使用默认数据";
        }
        initChipFilters();
        const chipSearch = document.getElementById("chipSearchInput");
        if (chipSearch) {
            chipSearch.addEventListener("input", (e) => {
                chipKeyword = e.target.value;
                renderChipsList();
            });
        }
        renderChipsList();
    }
    
    // ========== 车辆数据函数（保持原有完整逻辑） ==========
    function sortChipSlots(slots) {
        const order = { "circle": 0, "triangle": 1, "rhombus": 2, "hexagon": 3, "vslot": 4 };
        return [...slots].sort((a, b) => (order[a] ?? 5) - (order[b] ?? 5));
    }
    function getQualityClass(quality) {
        if (quality === "传说") return "legendary";
        if (quality === "史诗") return "epic";
        if (quality === "稀有") return "rare";
        return "normal";
    }
    function getBorderClass(quality) {
        if (quality === "传说") return "legendary-border";
        if (quality === "史诗") return "epic-border";
        if (quality === "稀有") return "rare-border";
        return "normal-border";
    }
    function getCorrectedQuality(carName, originalQuality) {
        const lowerName = carName.toLowerCase();
        for (const [key, value] of Object.entries(qualityOverrides)) {
            if (lowerName.includes(key.toLowerCase())) return value;
        }
        return originalQuality;
    }
    function sortVehicles(vehicles) {
        return [...vehicles].sort((a, b) => {
            const dateA = new Date(a.registerDate);
            const dateB = new Date(b.registerDate);
            if (dateA.getTime() !== dateB.getTime()) return dateB.getTime() - dateA.getTime();
            const qualityA = qualityWeight[a.quality] || 0;
            const qualityB = qualityWeight[b.quality] || 0;
            if (qualityA !== qualityB) return qualityB - qualityA;
            const posA = positionWeight[a.position] || 0;
            const posB = positionWeight[b.position] || 0;
            return posB - posA;
        });
    }
    function applyNumberHighlight(text) {
        if (!text) return text;
        let result = text;
        result = result.replace(/(\d+(?:\.\d+)?%)/g, '<span class="red-number">$1</span>');
        result = result.replace(/(\d+(?:\.\d+)?)(?![^<]*>)(?![^<]*<\/span>)/g, (match) => '<span class="red-number">' + match + '</span>');
        result = result.replace(/<span class="red-number"><span class="red-number">(.*?)<\/span><\/span>/g, '<span class="red-number">$1</span>');
        return result;
    }
    function highlightTerms(text) {
        if (!text) return text;
        let result = text;
        const terms = Object.keys(termDefinitions);
        for (const term of terms) {
            const regex = new RegExp(`(${term})`, 'g');
            result = result.replace(regex, `<span class="term-highlight" data-term="${term}">${term}</span>`);
        }
        return result;
    }
    function formatSkillText(text) {
        if (!text) return text;
        let result = highlightTerms(text);
        result = result.replace(/([：:；;])\s*/g, '$1\n');
        result = result.replace(/\n{2,}/g, '\n');
        result = result.replace(/(越野车[：:])\s*\n/g, '$1 ');
        let sentences = [], current = '';
        for (let i = 0; i < result.length; i++) {
            current += result[i];
            if (result[i] === '。' || result[i] === '．') { 
                sentences.push(current.trim()); 
                current = ''; 
            }
        }
        if (current.trim().length > 0) sentences.push(current);
        let formatted = sentences.join('\n');
        formatted = formatted.replace(/\n{2,}/g, '\n');
        formatted = applyNumberHighlight(formatted);
        return formatted;
    }
    function showTooltip(e, title, content, isMobile) {
        if (activeTooltipTimer) clearTimeout(activeTooltipTimer);
        if (currentTooltipElement && currentTooltipElement.remove) currentTooltipElement.remove();
        let displayContent = content.replace(/[\/／]/g, '\n');
        let lines = displayContent.split(/\n/).filter(l => l.trim().length > 0);
        let descHtml = lines.map(l => `<div class="term-desc-line">${l.trim()}</div>`).join('');
        let tip = document.createElement('div');
        tip.className = isMobile ? 'feature-tooltip-mobile' : 'feature-tooltip';
        tip.innerHTML = `<div class="term-title">${title}</div>${descHtml}`;
        document.body.appendChild(tip);
        let rect = e.target.getBoundingClientRect();
        let left = rect.left + rect.width/2 - tip.offsetWidth/2;
        let top = rect.top - tip.offsetHeight - 8;
        if (left < 5) left = 5;
        if (top < 5) top = rect.bottom + 8;
        tip.style.left = left + 'px';
        tip.style.top = top + 'px';
        currentTooltipElement = tip;
        activeTooltipTimer = setTimeout(() => { if (currentTooltipElement) currentTooltipElement.remove(); currentTooltipElement = null; activeTooltipTimer = null; }, 4000);
        if (isMobile) {
            const close = () => { if (activeTooltipTimer) clearTimeout(activeTooltipTimer); if (currentTooltipElement) currentTooltipElement.remove(); currentTooltipElement = null; activeTooltipTimer = null; document.removeEventListener('touchstart', close); document.removeEventListener('scroll', close); document.removeEventListener('click', close); };
            document.addEventListener('touchstart', close, { once: true });
            document.addEventListener('scroll', close, { once: true });
            document.addEventListener('click', close, { once: true });
        }
    }
    function bindTermAndFeatureEvents(isMobile) {
        document.querySelectorAll('.term-highlight').forEach(el => {
            el.removeEventListener(isMobile ? 'click' : 'mouseenter', el._handler);
            const term = el.dataset.term;
            let def = termDefinitions[term] || '暂无详细解释';
            if (!isMobile) {
                el._handler = (e) => { e.stopPropagation(); showTooltip(e, term, def, false); };
                el.addEventListener('mouseenter', el._handler);
                el.addEventListener('mouseleave', () => { if (activeTooltipTimer) clearTimeout(activeTooltipTimer); if (currentTooltipElement) currentTooltipElement.remove(); currentTooltipElement = null; activeTooltipTimer = null; });
            } else {
                el._handler = (e) => { e.stopPropagation(); showTooltip(e, term, def, true); };
                el.addEventListener('click', el._handler);
            }
        });
        document.querySelectorAll('.feature-box').forEach(box => {

    let activeAcqTooltip = null;
    function showAcqTooltip(e, text, isMobile) {

        tip.innerHTML = `<div class="term-title">获取方式</div><div class="term-desc-line" style="text-align:center;">${text}</div>`;
        document.body.appendChild(tip);
        let rect = e.currentTarget.getBoundingClientRect();
        let left = rect.left + rect.width/2 - tip.offsetWidth/2;
        let top = rect.top - tip.offsetHeight - 8;
        if (left < 5) left = 5;
        if (top < 5) top = rect.bottom + 8;
        tip.style.left = left + 'px';
        tip.style.top = top + 'px';
        activeAcqTooltip = tip;
        if (!isMobile) {
            const hide = () => { if (activeAcqTooltip) activeAcqTooltip.remove(); activeAcqTooltip = null; };
            e.currentTarget.removeEventListener('mouseleave', hide);
            e.currentTarget.addEventListener('mouseleave', hide);
            tip._hideHandler = hide;
        } else {
            const close = () => { if (activeAcqTooltip) activeAcqTooltip.remove(); activeAcqTooltip = null; document.removeEventListener('touchstart', close); document.removeEventListener('scroll', close); document.removeEventListener('click', close); };

    async function loadData() {
        try {
            const vehiclesUrl = './vehicles.json';
            const termsUrl = './terms.json';
            const vehiclesResponse = await fetch(vehiclesUrl);
            if (!vehiclesResponse.ok) {
                throw new Error(`HTTP ${vehiclesResponse.status}: 无法加载 vehicles.json`);
            }
            const vehiclesDataObj = await vehiclesResponse.json();
            if (!vehiclesDataObj.vehicles || !Array.isArray(vehiclesDataObj.vehicles)) {
                throw new Error('vehicles.json 格式错误：缺少 vehicles 数组');
            }
            vehiclesData = vehiclesDataObj.vehicles;
            vehiclesData.forEach(car => { car.quality = getCorrectedQuality(car.name, car.quality); });
            const termsResponse = await fetch(termsUrl);
            if (!termsResponse.ok) {
                throw new Error(`HTTP ${termsResponse.status}: 无法加载 terms.json`);
            }
            const termsDataObj = await termsResponse.json();
            if (!termsDataObj.terms) {
                throw new Error('terms.json 格式错误：缺少 terms 对象');
            }
            termDefinitions = termsDataObj.terms;
            for (const car of vehiclesData) car.chipSlots = sortChipSlots(car.chipSlots);
            initFilters();
            attachSearchInputEvents();
            const headerBackBtn = document.getElementById('headerBackBtn');
            if (headerBackBtn) headerBackBtn.style.display = 'none';
            const urlParams = new URLSearchParams(window.location.search);
            const carId = urlParams.get('car');
            if (carId) {
                const car = vehiclesData.find(v => v.id === carId);
                if (car) {
                    if (headerBackBtn) headerBackBtn.style.display = 'block';
                    renderDetailById(carId);
                } else {
                    renderList();
                }
            } else {
                renderList();
            }
            window.addEventListener('popstate', function(e) {
                const currentCarId = new URLSearchParams(window.location.search).get('car');
                const headerBackBtnElem = document.getElementById('headerBackBtn');
                if (currentCarId) {
                    const car = vehiclesData.find(v => v.id === currentCarId);
                    if (car) {
                        if (headerBackBtnElem) headerBackBtnElem.style.display = 'block';
                        renderDetailById(currentCarId);
                    } else {
                        if (headerBackBtnElem) headerBackBtnElem.style.display = 'none';
                        clearAllFilters();
                        restoreList();
                    }
                } else {
                    if (headerBackBtnElem) headerBackBtnElem.style.display = 'none';
                    restoreList();
                }
            });
            if (isMobileDevice()) {
                document.body.classList.add('has-fixed-header');
            }
            // 加载芯片数据（从 chips.json）
            await loadChipsData();
        } catch (error) {
            console.error('[加载错误]', error);
            const gridEl = document.getElementById("carsGrid");
            const statsEl = document.getElementById("statsText");
            if (gridEl) {
                gridEl.innerHTML = `<div style="text-align:center; padding:60px; color:#ff6b6b;">
                    <strong>数据加载失败</strong><br>
                    ${error.message}<br>
                    请确保 vehicles.json 和 terms.json 文件存在于当前目录，<br>
                    并且通过 HTTP 服务器访问。
                </div>`;
            }
            if (statsEl) statsEl.innerText = "加载失败，请查看控制台(F12)";
            // 即使车辆数据加载失败，也尝试加载芯片数据
            await loadChipsData();
        }
    }
    function filterAndSortVehicles() {
        let filtered = vehiclesData.filter(v => {
            if (activeFilters.position && v.position !== activeFilters.position) return false;
            if (activeFilters.specialty && v.specialty !== activeFilters.specialty) return false;
            if (activeFilters.quality && v.quality !== activeFilters.quality) return false;
            if (keyword) {
                const lowerKeyword = keyword.toLowerCase();
                if (!v.name.toLowerCase().includes(lowerKeyword) &&
                    !(v.skillName && v.skillName.toLowerCase().includes(lowerKeyword)) &&
                    !(v.searchKeywords && v.searchKeywords.some(k => k.toLowerCase().includes(lowerKeyword)))) return false;
            }
            return true;
        });
        return sortVehicles(filtered);
    }

                    <div class="desktop-filter-sections">
                        <div class="desktop-filter-section">
                            <div class="desktop-filter-section-title">定位</div>
                            <div class="desktop-filter-options" id="desktopPositionOptions">
                                <div class="desktop-filter-option" data-type="position" data-value="辅助"><img src="https://s3.bmp.ovh/2026/05/31/mtc05q5R.png" alt="辅助"> 辅助</div>
                                <div class="desktop-filter-option" data-type="position" data-value="竞速"><img src="https://s3.bmp.ovh/2026/05/31/7k3ksZ5K.png" alt="竞速"> 竞速</div>
                                <div class="desktop-filter-option" data-type="position" data-value="干扰"><img src="https://s3.bmp.ovh/2026/05/31/yoQTZbOL.png" alt="干扰"> 干扰</div>
                                <div class="desktop-filter-option" data-type="position" data-value="天平"><img src="https://s3.bmp.ovh/2026/05/31/S38JRfCL.png" alt="天平"> 天平</div>
                            </div>
                        </div>
                        <div class="desktop-filter-section">
                            <div class="desktop-filter-section-title">专精</div>
                            <div class="desktop-filter-options" id="desktopSpecialtyOptions">
                                <div class="desktop-filter-option" data-type="specialty" data-value="城市"><img src="https://s3.bmp.ovh/2026/05/31/nNwRnfQf.png" alt="城市"> 城市</div>
                                <div class="desktop-filter-option" data-type="specialty" data-value="山路"><img src="https://s3.bmp.ovh/2026/05/31/2y6MiwXC.png" alt="山路"> 山路</div>
                                <div class="desktop-filter-option" data-type="specialty" data-value="场地"><img src="https://s3.bmp.ovh/2026/05/31/qGyMY5a6.png" alt="场地"> 场地</div>
                            </div>
                        </div>
                        <div class="desktop-filter-section">
                            <div class="desktop-filter-section-title">品质</div>
                            <div class="desktop-filter-options" id="desktopQualityOptions">
                                <div class="desktop-quality-option" data-type="quality" data-value="传说">传说</div>
                                <div class="desktop-quality-option" data-type="quality" data-value="史诗">史诗</div>
                                <div class="desktop-quality-option" data-type="quality" data-value="稀有">稀有</div>
                                <div class="desktop-quality-option" data-type="quality" data-value="普通">普通</div>

            </div>
            <div class="cars-grid" id="carsGrid"></div>
            <div class="stats-text" id="statsText">加载中...</div>`;
        attachSearchInputEvents();
        renderList();
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        vehiclesPage.classList.add('active-page');
        window.scrollTo(0, 0);
    }
    function initTabs() {
        document.querySelectorAll('.sidebar .tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                let pageId = btn.dataset.page;
                if (pageId === 'vehicles') {
                    const currentCarId = new URLSearchParams(window.location.search).get('car');
                    if (currentCarId) {
                        const newUrl = window.location.pathname;
                        history.replaceState(null, '', newUrl);
                        restoreList();
                    } else {
                        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
                        document.getElementById('vehiclesPage').classList.add('active-page');
                        window.scrollTo(0, 0);
                    }
                } else if (pageId === 'chip') {
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
                    document.getElementById('chipPage').classList.add('active-page');
                    if (chipsData.length > 0) renderChipsList();
                    window.scrollTo(0, 0);
                } else {
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
                    document.getElementById(pageId + 'Page')?.classList.add('active-page');
                    window.scrollTo(0, 0);
                }
                document.querySelectorAll('.sidebar .tab-btn').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
            });
        });
    }
    initTabs();
    loadData();
</script>
</body>
</html>
