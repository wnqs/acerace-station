<script>
    // ==================== 全局变量 ====================
    let vehiclesData = [];
    let termDefinitions = {};
    let filters = { position: "all", specialty: "all", quality: "all", keyword: "" };
    let isDetail = false;
    let scrollPositions = { list: 0 };
    // 用于管理浮层定时器
    let activeTooltipTimer = null;
    let currentTooltipElement = null;
    
    const EXTRA_RACING_ICON_CARS = ["女武神"];
    const RACING_ICON_URL = "https://s3.bmp.ovh/2026/05/31/7k3ksZ5K.png";
    
    const qualityWeight = { "传说": 4, "史诗": 3, "稀有": 2, "普通": 1 };
    const positionWeight = { "竞速": 3, "辅助": 2, "干扰": 1, "天平": 2 };
    
    const qualityOverrides = {
        "mini jcw": "稀有",
        "风神": "传说",
        "幻蝶": "传说"
    };
    
    const CHIP_ICONS = {
        circle: "https://s3.bmp.ovh/2026/05/31/OnUTepDT.png",
        triangle: "https://s3.bmp.ovh/2026/05/31/J5FiGMmt.png",
        rhombus: "https://s3.bmp.ovh/2026/05/31/pw68CH6t.png",
        hexagon: "https://s3.bmp.ovh/2026/05/31/2vWKj9Ev.png",
        vslot: "https://s3.bmp.ovh/2026/05/31/Guvt6llt.png"
    };
    
    const POSITION_ICONS = {
        "辅助": "https://s3.bmp.ovh/2026/05/31/mtc05q5R.png",
        "竞速": "https://s3.bmp.ovh/2026/05/31/7k3ksZ5K.png",
        "干扰": "https://s3.bmp.ovh/2026/05/31/mtc05q5R.png",
        "天平": "https://s3.bmp.ovh/2026/05/31/S38JRfCL.png"
    };
    
    const SPECIALTY_ICONS = {
        "城市": "https://s3.bmp.ovh/2026/05/31/qGyMY5a6.png",
        "山路": "https://s3.bmp.ovh/2026/05/31/qGyMY5a6.png",
        "场地": "https://s3.bmp.ovh/2026/05/31/qGyMY5a6.png"
    };
    
    function sortChipSlots(slots) {
        const order = { "circle": 0, "triangle": 1, "rhombus": 2, "hexagon": 3, "vslot": 4 };
        return [...slots].sort((a, b) => (order[a] ?? 5) - (order[b] ?? 5));
    }
    
    function getQualityClass(quality) {
        if (quality === "传说") return "legendary";
        if (quality === "史诗") return "epic";
        if (quality === "稀有") return "rare";
        return "normal";
    }
    
    function getBorderClass(quality) {
        if (quality === "传说") return "legendary-border";
        if (quality === "史诗") return "epic-border";
        if (quality === "稀有") return "rare-border";
        return "normal-border";
    }
    
    function getCorrectedQuality(carName, originalQuality) {
        const lowerName = carName.toLowerCase();
        for (const [key, value] of Object.entries(qualityOverrides)) {
            if (lowerName.includes(key.toLowerCase())) {
                return value;
            }
        }
        return originalQuality;
    }
    
    function sortVehicles(vehicles) {
        return [...vehicles].sort((a, b) => {
            const dateA = new Date(a.registerDate);
            const dateB = new Date(b.registerDate);
            if (dateA.getTime() !== dateB.getTime()) {
                return dateB.getTime() - dateA.getTime();
            }
            const qualityA = qualityWeight[a.quality] || 0;
            const qualityB = qualityWeight[b.quality] || 0;
            if (qualityA !== qualityB) {
                return qualityB - qualityA;
            }
            const posA = positionWeight[a.position] || 0;
            const posB = positionWeight[b.position] || 0;
            return posB - posA;
        });
    }
    
    function applyNumberHighlight(text) {
        if (!text) return text;
        let result = text;
        result = result.replace(/(\d+(?:\.\d+)?%)/g, '<span class="red-number">$1</span>');
        result = result.replace(/(\d+(?:\.\d+)?)(?![^<]*>)(?![^<]*<\/span>)/g, (match) => {
            return '<span class="red-number">' + match + '</span>';
        });
        result = result.replace(/<span class="red-number"><span class="red-number">(.*?)<\/span><\/span>/g, '<span class="red-number">$1</span>');
        return result;
    }
    
    function highlightTerms(text) {
        if (!text) return text;
        let result = text;
        const terms = Object.keys(termDefinitions);
        for (const term of terms) {
            const regex = new RegExp(`(${term})`, 'g');
            result = result.replace(regex, `<span class="term-highlight" data-term="${term}">${term}</span>`);
        }
        return result;
    }
    
    // 越野车文字格式优化：以句号为分段依据
    function formatSkillText(text) {
        if (!text) return text;
        let result = highlightTerms(text);
        result = result.replace(/(越野车[：:])\s*\n/g, '$1 ');
        let sentences = [];
        let currentSentence = '';
        for (let i = 0; i < result.length; i++) {
            currentSentence += result[i];
            if (result[i] === '。' || result[i] === '．') {
                sentences.push(currentSentence);
                currentSentence = '';
            }
        }
        if (currentSentence.trim().length > 0) {
            sentences.push(currentSentence);
        }
        let formatted = sentences.join('\n');
        formatted = formatted.replace(/\n{2,}/g, '\n');
        formatted = formatted.replace(/[；;]\s*/g, '\n');
        formatted = formatted.replace(/[：:]\s*(?=[^\n])/g, '：');
        formatted = applyNumberHighlight(formatted);
        return formatted;
    }
    
    // 通用浮层显示函数（支持自动关闭、触摸/滚动关闭）
    function showSmartTooltip(e, title, content, isMobile) {
        // 清除已有定时器和浮层
        if (activeTooltipTimer) {
            clearTimeout(activeTooltipTimer);
            activeTooltipTimer = null;
        }
        if (currentTooltipElement && currentTooltipElement.remove) {
            currentTooltipElement.remove();
            currentTooltipElement = null;
        }
        
        let tip = document.createElement('div');
        tip.className = 'feature-tooltip';
        // 处理内容换行
        let contentLines = content.split(/\n/).filter(line => line.trim().length > 0);
        let descHtml = '';
        for (let line of contentLines) {
            descHtml += `<div class="term-desc-line">${line.trim()}</div>`;
        }
        tip.innerHTML = `<div class="term-title">${title}</div>${descHtml}`;
        document.body.appendChild(tip);
        
        let rect = e.target.getBoundingClientRect();
        let left = rect.left + rect.width/2 - tip.offsetWidth/2;
        let top = rect.top - tip.offsetHeight - 8;
        if (left < 5) left = 5;
        if (top < 5) top = rect.bottom + 8;
        tip.style.left = left + 'px';
        tip.style.top = top + 'px';
        
        currentTooltipElement = tip;
        
        // 设置5秒后自动关闭
        activeTooltipTimer = setTimeout(() => {
            if (currentTooltipElement && currentTooltipElement.remove) {
                currentTooltipElement.remove();
                currentTooltipElement = null;
            }
            activeTooltipTimer = null;
        }, 5000);
        
        // 移动端：绑定触摸/滚动关闭事件
        if (isMobile) {
            const closeTooltip = () => {
                if (activeTooltipTimer) clearTimeout(activeTooltipTimer);
                if (currentTooltipElement && currentTooltipElement.remove) {
                    currentTooltipElement.remove();
                    currentTooltipElement = null;
                }
                activeTooltipTimer = null;
                document.removeEventListener('touchstart', closeTooltip);
                document.removeEventListener('scroll', closeTooltip);
            };
            document.addEventListener('touchstart', closeTooltip, { once: true });
            document.addEventListener('scroll', closeTooltip, { once: true });
        }
    }
    
    function bindMobileFriendlyHighlights(isMobile) {
        // 绑定专有名词点击事件（手机端点击显示5秒）
        document.querySelectorAll('.term-highlight').forEach(el => {
            el.removeEventListener('click', el._clickHandler);
            const term = el.dataset.term;
            let def = termDefinitions[term] || '暂无详细解释';
            el._clickHandler = (e) => {
                e.stopPropagation();
                showSmartTooltip(e, term, def, isMobile);
            };
            el.addEventListener('click', el._clickHandler);
        });
        
        // 绑定车辆特点点击事件（手机端点击显示5秒）
        document.querySelectorAll('.feature-box').forEach(box => {
            box.removeEventListener('click', box._clickHandler);
            const name = box.dataset.name;
            const desc = box.dataset.desc;
            box._clickHandler = (e) => {
                e.stopPropagation();
                showSmartTooltip(e, name, desc, isMobile);
            };
            box.addEventListener('click', box._clickHandler);
        });
    }
    
    function bindTermHighlights(isMobile) {
        // 电脑端使用原来的悬浮效果，手机端使用点击效果（已在上面处理）
        if (!isMobile) {
            document.querySelectorAll('.term-highlight').forEach(el => {
                el.removeEventListener('mouseenter', el._mouseEnterHandler);
                el.removeEventListener('mouseleave', el._mouseLeaveHandler);
                const term = el.dataset.term;
                let def = termDefinitions[term] || '暂无详细解释';
                el._mouseEnterHandler = (e) => { 
                    e.stopPropagation(); 
                    showSmartTooltip(e, term, def, false); 
                };
                el._mouseLeaveHandler = () => { 
                    if (activeTooltipTimer) clearTimeout(activeTooltipTimer);
                    if (currentTooltipElement && currentTooltipElement.remove) {
                        currentTooltipElement.remove();
                        currentTooltipElement = null;
                    }
                    activeTooltipTimer = null;
                };
                el.addEventListener('mouseenter', el._mouseEnterHandler);
                el.addEventListener('mouseleave', el._mouseLeaveHandler);
            });
            
            document.querySelectorAll('.feature-box').forEach(box => {
                box.removeEventListener('mouseenter', box._mouseEnterHandler);
                box.removeEventListener('mouseleave', box._mouseLeaveHandler);
                const name = box.dataset.name;
                const desc = box.dataset.desc;
                box._mouseEnterHandler = (e) => { 
                    e.stopPropagation(); 
                    showSmartTooltip(e, name, desc, false); 
                };
                box._mouseLeaveHandler = () => {
                    if (activeTooltipTimer) clearTimeout(activeTooltipTimer);
                    if (currentTooltipElement && currentTooltipElement.remove) {
                        currentTooltipElement.remove();
                        currentTooltipElement = null;
                    }
                    activeTooltipTimer = null;
                };
                box.addEventListener('mouseenter', box._mouseEnterHandler);
                box.addEventListener('mouseleave', box._mouseLeaveHandler);
            });
        } else {
            // 手机端不需要悬浮事件，清理掉避免干扰
            document.querySelectorAll('.term-highlight').forEach(el => {
                el.removeEventListener('mouseenter', el._mouseEnterHandler);
                el.removeEventListener('mouseleave', el._mouseLeaveHandler);
            });
            document.querySelectorAll('.feature-box').forEach(box => {
                box.removeEventListener('mouseenter', box._mouseEnterHandler);
                box.removeEventListener('mouseleave', box._mouseLeaveHandler);
            });
        }
    }
    
    function formatFeatureDesc(desc) {
        if (!desc) return '';
        let result = desc.replace(/[\/／]/g, '\n');
        result = result.split('\n').map(line => line.trim()).join('\n');
        return result;
    }
    
    let activeAcqTooltip = null;
    function showAcqTooltip(e, text, isMobile) {
        if (activeAcqTooltip) { activeAcqTooltip.remove(); activeAcqTooltip = null; }
        let tip = document.createElement('div');
        tip.className = 'feature-tooltip';
        tip.innerHTML = `<div class="term-desc-line" style="text-align:center;">${text}</div>`;
        document.body.appendChild(tip);
        let rect = e.currentTarget.getBoundingClientRect();
        let left = rect.left + rect.width/2 - tip.offsetWidth/2;
        let top = rect.top - tip.offsetHeight - 8;
        if (left < 5) left = 5;
        if (top < 5) top = rect.bottom + 8;
        tip.style.left = left + 'px';
        tip.style.top = top + 'px';
        activeAcqTooltip = tip;
        
        if (!isMobile) {
            const hideHandler = () => { if (activeAcqTooltip) { activeAcqTooltip.remove(); activeAcqTooltip = null; } };
            e.currentTarget.removeEventListener('mouseleave', hideHandler);
            e.currentTarget.addEventListener('mouseleave', hideHandler);
            tip._hideHandler = hideHandler;
        } else {
            setTimeout(() => { if (activeAcqTooltip) { activeAcqTooltip.remove(); activeAcqTooltip = null; } }, 2000);
        }
    }
    
    async function loadData() {
        try {
            const vehiclesResponse = await fetch('vehicles.json');
            const vehiclesDataObj = await vehiclesResponse.json();
            vehiclesData = vehiclesDataObj.vehicles;
            vehiclesData.forEach(car => {
                car.originalQuality = car.quality;
                car.quality = getCorrectedQuality(car.name, car.quality);
            });
            const termsResponse = await fetch('terms.json');
            const termsDataObj = await termsResponse.json();
            termDefinitions = termsDataObj.terms;
            for (const car of vehiclesData) {
                car.chipSlots = sortChipSlots(car.chipSlots);
            }
            renderList();
        } catch (error) {
            document.getElementById("carsGrid").innerHTML = '<div style="text-align:center; padding:60px; color:#ff6b6b;">数据加载失败，请检查 vehicles.json 和 terms.json 文件是否存在</div>';
            document.getElementById("statsText").innerText = "加载失败";
        }
    }
    
    function matchesSearch(car, keyword) {
        if (!keyword) return true;
        const lowerKeyword = keyword.toLowerCase();
        if (car.name.toLowerCase().includes(lowerKeyword)) return true;
        if (car.skillName && car.skillName.toLowerCase().includes(lowerKeyword)) return true;
        if (car.searchKeywords && car.searchKeywords.some(k => k.toLowerCase().includes(lowerKeyword))) return true;
        return false;
    }
    
    function filterAndSortVehicles() {
        let filtered = vehiclesData.filter(v => {
            if (filters.position !== "all" && v.position !== filters.position) return false;
            if (filters.specialty !== "all" && v.specialty !== filters.specialty) return false;
            if (filters.quality !== "all" && v.quality !== filters.quality) return false;
            if (!matchesSearch(v, filters.keyword)) return false;
            return true;
        });
        return sortVehicles(filtered);
    }
    
    function isMobileDevice() {
        return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;
    }
    
    function renderList() {
        let filtered = filterAndSortVehicles();
        let grid = document.getElementById("carsGrid");
        let stats = document.getElementById("statsText");
        if (!grid) return;
        if (filtered.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:60px; color:#8a8aa3;">暂无车辆数据</div>';
            stats.innerText = "共 0 辆车";
            return;
        }
        grid.innerHTML = filtered.map(car => {
            let bgClass = getQualityClass(car.quality);
            let borderClass = getBorderClass(car.quality);
            let badgeClass = car.quality === "传说" ? "legendary" : (car.quality === "史诗" ? "epic" : (car.quality === "稀有" ? "rare" : "normal"));
            let positionIcon = POSITION_ICONS[car.positionIcon] || POSITION_ICONS["辅助"];
            let specialtyIcon = SPECIALTY_ICONS[car.specialty] || SPECIALTY_ICONS["场地"];
            
            let extraRacingHtml = '';
            if (EXTRA_RACING_ICON_CARS.includes(car.name)) {
                extraRacingHtml = `<div class="meta-item"><img src="${RACING_ICON_URL}"><span>竞速</span></div>`;
            }
            
            return `
                <div class="car-card ${borderClass}" data-id="${car.id}">
                    <div class="card-image ${bgClass}">
                        <img src="${car.imageUrl}" referrerpolicy="no-referrer" onerror="this.src='https://placehold.co/400x200?text=Car'">
                        <div class="acquisition-icon" data-acq="${car.acquisition.replace(/"/g, '&quot;')}">
                            <img src="${car.acquisitionIcon}" referrerpolicy="no-referrer">
                        </div>
                    </div>
                    <div class="card-info">
                        <div class="car-title"><span class="car-name">${car.name}</span></div>
                        <div class="car-meta">
                            <div class="meta-item"><img src="${positionIcon}"><span>${car.position}</span></div>
                            ${extraRacingHtml}
                            <div class="meta-item"><img src="${specialtyIcon}"><span>${car.specialty}</span></div>
                        </div>
                        <div class="car-description">${car.description}</div>
                    </div>
                    <div class="quality-badge-wrapper"><span class="quality-badge ${badgeClass}">${car.quality}</span></div>
                </div>
            `;
        }).join("");
        stats.innerText = `共 ${filtered.length} 辆车`;
        
        const mobile = isMobileDevice();
        document.querySelectorAll('.acquisition-icon').forEach(icon => {
            icon.removeEventListener('mouseenter', icon._mouseEnterHandler);
            icon.removeEventListener('mouseleave', icon._mouseLeaveHandler);
            icon.removeEventListener('click', icon._clickHandler);
            const acqText = icon.dataset.acq;
            if (!mobile) {
                icon._mouseEnterHandler = (e) => { e.stopPropagation(); showAcqTooltip(e, acqText, false); };
                icon._mouseLeaveHandler = () => { if (activeAcqTooltip) { activeAcqTooltip.remove(); activeAcqTooltip = null; } };
                icon.addEventListener('mouseenter', icon._mouseEnterHandler);
                icon.addEventListener('mouseleave', icon._mouseLeaveHandler);
            } else {
                icon._clickHandler = (e) => { e.stopPropagation(); showAcqTooltip(e, acqText, true); };
                icon.addEventListener('click', icon._clickHandler);
            }
        });
        document.querySelectorAll('.car-card').forEach(card => {
            card.removeEventListener('click', card._clickHandler);
            card._clickHandler = (e) => { if (!e.target.closest('.acquisition-icon')) showDetail(card.dataset.id); };
            card.addEventListener('click', card._clickHandler);
        });
    }
    
    function showDetail(id) {
        scrollPositions.list = window.scrollY;
        let car = vehiclesData.find(v => v.id === id);
        if (!car) return;
        isDetail = true;
        const url = new URL(window.location.href);
        url.searchParams.set('car', id);
        history.pushState({ page: 'detail', carId: id }, '', url);
        
        let stats = car.stats;
        let chipSlots = car.chipSlots.map(t => CHIP_ICONS[t]);
        let bgClass = getQualityClass(car.quality);
        let positionIcon = POSITION_ICONS[car.positionIcon] || POSITION_ICONS["辅助"];
        let specialtyIcon = SPECIALTY_ICONS[car.specialty] || SPECIALTY_ICONS["场地"];
        let ultDesc = formatSkillText(car.skills.ult.desc);
        let recuDesc = formatSkillText(car.skills.ult.recu);
        let passiveDesc = formatSkillText(car.skills.passive.desc);
        let ultPassiveBlock = car.skills.ult.ultPassive ? `<div class="sub-skill"><div class="sub-skill-title">解锁大招被动</div><div class="sub-skill-desc">${formatSkillText(car.skills.ult.ultPassive)}</div></div>` : '';
        let featuresHtml = (car.skills.features && car.skills.features.length) ? car.skills.features.map(f => `<div class="feature-box" data-desc="${(f.desc || '').replace(/"/g, '&quot;')}" data-name="${f.name}" data-color="${f.color || '默认'}">${f.name}</div>`).join('') : '<div style="color:#8a8aa3; padding:10px;">暂无特点数据</div>';
        let spBlockHtml = '';
        if (car.sp) {
            let spDesc = formatSkillText(car.sp.desc);
            spBlockHtml = `<div class="skill-block"><div class="skill-header"><div class="skill-icon"><img src="${car.sp.icon}"></div><div class="skill-title">SP：${car.sp.name}</div></div><div class="skill-desc"><div class="sp-cooltime">冷却时间：${car.sp.cooltime}</div>${spDesc}</div></div>`;
        }
        let nitroChargeHtml = `<span class="gold-number">${stats.nitroCharge}</span>`;
        let startChargeHtml = `<span class="gold-number">${stats.startCharge}</span>`;
        
        let html = `
            <div class="detail-container">
                <button class="detail-back-btn" id="backBtn">← 返回列表</button>
                <div class="detail-header">
                    <div class="detail-image ${bgClass}">
                        <img src="${car.imageUrl}" onerror="this.src='https://placehold.co/600x400?text=Car'">
                        <div class="detail-acquisition-area">
                            <div class="detail-acquisition-icon"><img src="${car.acquisitionIcon}"></div>
                            <span class="detail-acquisition-text">${car.acquisition}</span>
                        </div>
                    </div>
                    <div class="detail-info-panel">
                        <div class="detail-name">${car.name}</div>
                        <div class="detail-badges"><span class="quality-badge-large">${car.quality}</span><div class="badge"><img src="${positionIcon}"> ${car.position}位</div><div class="badge"><img src="${specialtyIcon}"> ${car.specialty}</div></div>
                        <div class="info-rows"><div class="info-row"><span class="info-label">注册日期</span><span class="info-value">${car.registerDate || '未知'}</span></div><div class="info-row"><span class="info-label">车辆类型</span><span class="info-value">${car.vehicleType || '未知'}</span></div><div class="info-row"><span class="info-label">厂商</span><span class="info-value">${car.manufacturer || '未知'}</span></div></div>
                    </div>
                </div>
                <div class="features-section"><div class="section-title">车辆特点</div><div class="features-horizontal">${featuresHtml}</div></div>
                <div class="chip-slots"><div class="section-title">芯片槽</div><div class="chip-icons">${chipSlots.map(icon => `<div class="chip-icon"><img src="${icon}"></div>`).join('')}</div></div>
                <div class="chip-workshop"><div class="workshop-title">芯片要求搭配</div><div class="workshop-placeholder">芯片要求搭配（配合赋能版）预留区<p>后续版本将展示社区高玩芯片组合、赋能推荐以及AI智能搭配方案</p></div></div>
                <div class="vehicle-stats"><div class="section-title">车辆基础数据</div><div class="stats-grid">
                    <div class="stat-card"><span>极速</span><span>${stats.topSpeed}</span></div>
                    <div class="stat-card"><span>动力</span><span>${stats.power}</span></div>
                    <div class="stat-card"><span>耐久</span><span>${stats.durability}</span></div>
                    <div class="stat-card"><span>氮气充能</span><span>${nitroChargeHtml}</span></div>
                    <div class="stat-card"><span>起步充能</span><span>${startChargeHtml}</span></div>
                    <div class="stat-card"><span>氮气时长</span><span>${stats.nitroDuration}</span></div>
                    <div class="stat-card"><span>氮气极速</span><span><span class="blue">${stats.nitroSpeed.blue}</span> / <span class="purple">${stats.nitroSpeed.purple}</span></span></div>
                    <div class="stat-card"><span>涡轮时长</span><span><span class="blue">${stats.turboDuration.blue}</span> / <span class="purple">${stats.turboDuration.purple}</span></span></div>
                    <div class="stat-card"><span>涡轮极速</span><span><span class="blue">${stats.turboSpeed.blue}</span> / <span class="purple">${stats.turboSpeed.purple}</span></span></div>
                    <div class="stat-card"><span>大招动力</span><span>${stats.ultPower}</span></div>
                </div></div>
                <div class="skills-section">
                    <div class="skill-block"><div class="skill-header"><div class="skill-icon"><img src="${car.ultIcon}"></div><div class="skill-title">大招：${car.skills.ult.name}</div></div><div class="skill-desc">${ultDesc}</div><div class="sub-skill"><div class="sub-skill-title">RECU限制解除（8级解锁）</div><div class="sub-skill-desc">${recuDesc}</div></div>${ultPassiveBlock}</div>
                    <div class="skill-block"><div class="skill-header"><div class="skill-icon"><img src="${car.passiveIcon}"></div><div class="skill-title">被动：${car.skills.passive.name}</div></div><div class="skill-desc">${passiveDesc}</div></div>
                    ${spBlockHtml}
                </div>
            </div>
        `;
        let vehiclesPage = document.getElementById("vehiclesPage");
        vehiclesPage.innerHTML = html;
        document.getElementById("backBtn")?.addEventListener("click", restoreList);
        
        const mobile = isMobileDevice();
        // 重新绑定点击事件（手机端点击显示，电脑端悬浮显示）
        bindMobileFriendlyHighlights(mobile);
        bindTermHighlights(mobile);
        
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        vehiclesPage.classList.add('active-page');
        window.scrollTo(0, 0);
    }
    
    window.addEventListener('popstate', function(event) {
        if (isDetail) {
            restoreList();
        } else {
            let carId = new URLSearchParams(window.location.search).get('car');
            if (carId && vehiclesData.find(v => v.id === carId)) {
                showDetail(carId);
            }
        }
    });
    
    function restoreList() {
        const url = new URL(window.location.href);
        url.searchParams.delete('car');
        history.pushState({ page: 'list' }, '', url);
        let vehiclesPage = document.getElementById("vehiclesPage");
        vehiclesPage.innerHTML = `
            <div class="filter-bar">
                <div class="search-box"><input type="text" id="searchInput" placeholder="搜索车辆名称、技能..."></div>
                <div class="filter-groups">
                    <div class="filter-group"><span class="filter-label">定位：</span>
                        <button class="filter-btn active" data-type="position" data-value="all">全部</button>
                        <button class="filter-btn" data-type="position" data-value="辅助">辅助</button>
                        <button class="filter-btn" data-type="position" data-value="竞速">竞速</button>
                        <button class="filter-btn" data-type="position" data-value="干扰">干扰</button>
                        <button class="filter-btn" data-type="position" data-value="天平">天平</button>
                    </div>
                    <div class="filter-group"><span class="filter-label">专精：</span>
                        <button class="filter-btn active" data-type="specialty" data-value="all">全部</button>
                        <button class="filter-btn" data-type="specialty" data-value="城市">城市</button>
                        <button class="filter-btn" data-type="specialty" data-value="山路">山路</button>
                        <button class="filter-btn" data-type="specialty" data-value="场地">场地</button>
                    </div>
                    <div class="filter-group"><span class="filter-label">品质：</span>
                        <button class="filter-btn active" data-type="quality" data-value="all">全部</button>
                        <button class="filter-btn" data-type="quality" data-value="传说">传说</button>
                        <button class="filter-btn" data-type="quality" data-value="史诗">史诗</button>
                        <button class="filter-btn" data-type="quality" data-value="稀有">稀有</button>
                        <button class="filter-btn" data-type="quality" data-value="普通">普通</button>
                    </div>
                </div>
            </div>
            <div class="cars-grid" id="carsGrid"></div>
            <div class="stats-text" id="statsText">加载中...</div>
        `;
        bindFilters();
        renderList();
        isDetail = false;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        vehiclesPage.classList.add('active-page');
        setTimeout(() => {
            window.scrollTo(0, scrollPositions.list || 0);
        }, 50);
    }
    
    function bindFilters() {
        document.querySelectorAll('#vehiclesPage .filter-btn').forEach(btn => {
            btn.removeEventListener('click', btn._listener);
            btn.addEventListener('click', btn._listener = () => {
                let type = btn.dataset.type, value = btn.dataset.value;
                if (type && value) { filters[type] = value; document.querySelectorAll(`#vehiclesPage .filter-btn[data-type="${type}"]`).forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderList(); }
            });
        });
        let si = document.getElementById('searchInput');
        if (si) { si.removeEventListener('input', si._listener); si.addEventListener('input', si._listener = (e) => { filters.keyword = e.target.value; renderList(); }); }
    }
    
    function initTabs() {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                let pageId = btn.dataset.page;
                if (pageId === 'vehicles' && isDetail) restoreList();
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
                document.getElementById(pageId + 'Page')?.classList.add('active-page');
                document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                if (pageId !== 'vehicles') isDetail = false;
                if (pageId === 'vehicles') window.scrollTo(0, scrollPositions.list || 0);
            });
        });
    }
    
    initTabs();
    bindFilters();
    loadData();
</script>
</body>
</html>
