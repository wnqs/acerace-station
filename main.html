<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>王牌竞速·情报站 | 核心档案</title>
    <style>
        /* ========== RESET & GLOBAL ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0c15;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
            color: #eef2ff;
        }
        /* 主布局 */
        .app-layout {
            display: flex;
            max-width: 1600px;
            margin: 0 auto;
            min-height: 100vh;
        }
        /* ========== 电脑端侧边栏 (仅电脑可见) ========== */
        .sidebar {
            width: 260px;
            background: rgba(10, 12, 21, 0.92);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255,255,255,0.08);
            padding: 28px 0;
            position: sticky;
            top: 0;
            height: 100vh;
            flex-shrink: 0;
        }
        .sidebar .logo-area {
            padding: 0 20px 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 24px;
            cursor: pointer;
        }
        .sidebar .logo-area h1 {
            font-size: 1.4rem;
            background: linear-gradient(135deg, #FFD966, #FF8C42);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sidebar .logo-area p {
            font-size: 0.7rem;
            color: #8E9AAF;
        }
        .nav-tabs {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 16px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #a5b3d1;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #FF8C42;
            color: #0a0c15;
            box-shadow: 0 4px 12px rgba(255,140,66,0.3);
        }
        .main-content {
            flex: 1;
            padding: 28px 32px 60px 32px;
            overflow-x: hidden;
        }
        /* 电脑端车辆数据专用筛选栏 (完全独立，不使用手机样式) */
        .pc-vehicle-header {
            background: rgba(15, 18, 28, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 32px;
            padding: 20px 24px;
        }
        .pc-search-row {
            margin-bottom: 20px;
        }
        .pc-search-row input {
            width: 100%;
            max-width: 420px;
            background: #141824;
            border: 1px solid #2a2f3f;
            border-radius: 48px;
            padding: 12px 20px;
            font-size: 0.9rem;
            color: #f0f3fa;
            outline: none;
        }
        .pc-search-row input:focus {
            border-color: #FF8C42;
        }
        .pc-filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
        }
        .pc-filter-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .pc-filter-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #FFD966;
        }
        .pc-filter-options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .pc-chip {
            background: #1e2332;
            border: 1px solid #2e3548;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #cbd5e6;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .pc-chip.active {
            background: #FF8C42;
            border-color: #FF8C42;
            color: #0a0c15;
            font-weight: 600;
        }
        /* 车辆卡片网格 (电脑端每行3个) */
        .cars-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
            margin-top: 8px;
        }
        .car-card {
            background: linear-gradient(145deg, #131724, #0e1019);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid #292f42;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .car-card:hover {
            transform: translateY(-5px);
            border-color: #FF8C42;
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.6);
        }
        .card-image {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(145deg, #111520, #0a0c14);
            position: relative;
        }
        .card-image img {
            max-width: 100%;
            max-height: 130px;
            object-fit: contain;
        }
        .quality-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 800;
        }
        .quality-legendary { background: #d4af37; color: #1e1a0c; }
        .quality-epic { background: #9b59b6; color: #f3e5ff; }
        .quality-rare { background: #2c7da0; color: #eef2ff; }
        .quality-normal { background: #5f6c84; color: #f0f2f5; }
        .card-info { padding: 16px; }
        .car-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
        .car-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
        .meta-item { background: rgba(255,255,255,0.08); padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; }
        .car-description { font-size: 0.75rem; color: #8e9cc5; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }
        .stats-text { text-align: center; margin-top: 28px; font-size: 0.8rem; color: #7b89aa; }

        /* ========== 手机端专用样式 (完全独立，统一分类按钮大小) ========== */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { padding: 16px 16px 40px; width: 100%; }
            /* 手机端固定头部 */
            .mobile-fixed-header {
                position: sticky;
                top: 0;
                background: #0a0c15;
                z-index: 200;
                border-bottom: 1px solid #2a2f40;
                backdrop-filter: blur(12px);
                padding-bottom: 8px;
            }
            .mobile-logo-area {
                text-align: center;
                padding: 12px 0 6px;
                cursor: pointer;
            }
            .mobile-logo-area h1 {
                font-size: 1.2rem;
                background: linear-gradient(135deg, #FFD966, #FF8C42);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
            }
            .mobile-nav-tabs {
                display: flex;
                gap: 6px;
                overflow-x: auto;
                padding: 8px 4px;
            }
            .mobile-tab-btn {
                background: #1a1f2e;
                border: none;
                padding: 6px 14px;
                border-radius: 40px;
                font-size: 0.7rem;
                font-weight: 600;
                color: #b9c5e6;
                white-space: nowrap;
                cursor: pointer;
            }
            .mobile-tab-btn.active {
                background: #FF8C42;
                color: #0a0c15;
            }
            /* 手机端筛选栏 —— 统一所有分类选项大小，解决图中尺寸不一问题 */
            .mobile-filter-bar {
                background: #10131f;
                border-radius: 24px;
                padding: 14px 12px;
                margin: 12px 0 16px;
                border: 1px solid #2a2f42;
            }
            .mobile-search-box {
                margin-bottom: 14px;
            }
            .mobile-search-box input {
                width: 100%;
                background: #1a1f2e;
                border: 1px solid #2e3548;
                border-radius: 48px;
                padding: 10px 16px;
                font-size: 0.85rem;
                color: white;
                outline: none;
            }
            /* 关键修复：统一手机端所有筛选按钮的尺寸、内边距、字体，确保每个chip一致 */
            .mobile-filter-group {
                margin-bottom: 14px;
            }
            .mobile-filter-label {
                font-size: 0.65rem;
                font-weight: 700;
                color: #FFD966;
                margin-bottom: 8px;
                display: block;
            }
            .mobile-options {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                align-items: center;
            }
            /* 统一芯片样式：固定内边距，不会因为文字长短变大变小 */
            .mobile-chip {
                background: #1e2437;
                border: 1px solid #2e3548;
                border-radius: 60px;
                padding: 6px 16px;
                font-size: 0.75rem;
                font-weight: 500;
                color: #cbd5e6;
                cursor: pointer;
                transition: all 0.2s;
                white-space: nowrap;
                display: inline-flex;
                align-items: center;
                gap: 6px;
                line-height: 1.2;
            }
            .mobile-chip.active {
                background: #FF8C42;
                border-color: #FF8C42;
                color: #0a0c15;
                font-weight: 600;
            }
            /* 手机端车辆卡片每行2个 */
            .cars-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 14px;
            }
            .card-image { height: 130px; padding: 12px; }
            .car-name { font-size: 0.9rem; }
            .meta-item { font-size: 0.55rem; padding: 2px 8px; }
            .car-description { font-size: 0.65rem; }
            .quality-badge { font-size: 0.55rem; padding: 2px 8px; bottom: 8px; right: 8px; }
            /* 隐藏电脑端筛选区域 */
            .pc-vehicle-header { display: none; }
        }

        @media (min-width: 769px) {
            .mobile-fixed-header { display: none; }
            .pc-vehicle-header { display: block; }
        }

        /* 详情页与辅助样式 */
        .detail-container {
            background: #0f1220;
            border-radius: 32px;
            border: 1px solid #2a2f42;
            overflow: hidden;
        }
        .detail-header { display: flex; gap: 32px; padding: 32px; flex-wrap: wrap; }
        .detail-image { flex: 1.2; min-width: 260px; background: #111520; border-radius: 28px; padding: 30px; text-align: center; position: relative; }
        .detail-image img { max-width: 100%; max-height: 280px; object-fit: contain; }
        .detail-info-panel { flex: 1; background: rgba(20,24,36,0.6); border-radius: 28px; padding: 24px; }
        .detail-name { font-size: 1.8rem; font-weight: 800; margin-bottom: 16px; }
        .section-title { font-size: 1.3rem; font-weight: 700; margin: 20px 0 16px 0; color: #FFD966; padding-left: 12px; border-left: 4px solid #FF8C42; }
        .features-horizontal { display: flex; flex-wrap: wrap; gap: 12px; }
        .feature-box { background: #1e2335; padding: 8px 20px; border-radius: 60px; font-size: 0.8rem; cursor: pointer; }
        .chip-icons { display: flex; gap: 16px; flex-wrap: wrap; }
        .chip-icon { width: 56px; height: 56px; background: #00000040; border-radius: 16px; display: flex; align-items: center; justify-content: center; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 14px; }
        .stat-card { background: #1a1e2c; padding: 10px 16px; border-radius: 20px; display: flex; justify-content: space-between; }
        .skill-desc { background: #1a1e2c; padding: 14px 18px; border-radius: 20px; margin-top: 8px; line-height: 1.5; }
        .page { display: none; }
        .page.active-page { display: block; }
        .detail-back-btn { background: #FF8C42; border: none; border-radius: 40px; padding: 6px 16px; font-weight: bold; cursor: pointer; margin-bottom: 16px; }
        .no-results { text-align: center; padding: 40px; color: #7e89aa; }
    </style>
</head>
<body>
<div class="app-layout">
    <!-- 电脑端侧边栏 -->
    <div class="sidebar">
        <div class="logo-area" id="logoHome">
            <h1>王牌竞速·情报站</h1>
            <p>核心档案 · 赛车数据</p>
        </div>
        <div class="nav-tabs">
            <button class="tab-btn active" data-tab="vehicles">🏁 车辆数据</button>
            <button class="tab-btn" data-tab="chip">🧠 芯片架构</button>
            <button class="tab-btn" data-tab="energy">⚡ 赋能系统</button>
            <button class="tab-btn" data-tab="calculator">📐 芯片要求计算器</button>
            <button class="tab-btn" data-tab="news">🔥 爆料信息</button>
            <button class="tab-btn" data-tab="wallpaper">🖼️ 游戏壁纸</button>
        </div>
    </div>

    <div class="main-content">
        <!-- 车辆数据页面 -->
        <div id="vehiclesPage" class="page active-page">
            <!-- 电脑端独立筛选栏 (布局精致，未混用手机样式) -->
            <div class="pc-vehicle-header" id="pcFilterArea">
                <div class="pc-search-row">
                    <input type="text" id="pcSearchInput" placeholder="🔍 搜索车辆名称、简称、技能...">
                </div>
                <div class="pc-filter-row">
                    <div class="pc-filter-group">
                        <div class="pc-filter-label">🏷️ 分类</div>
                        <div class="pc-filter-options" id="pcCategoryOptions"></div>
                    </div>
                    <div class="pc-filter-group">
                        <div class="pc-filter-label">📍 专精</div>
                        <div class="pc-filter-options" id="pcSpecialtyOptions"></div>
                    </div>
                    <div class="pc-filter-group">
                        <div class="pc-filter-label">💎 品质</div>
                        <div class="pc-filter-options" id="pcQualityOptions"></div>
                    </div>
                </div>
            </div>
            <!-- 车辆列表 & 详情动态 -->
            <div id="vehicleListArea">
                <div class="cars-grid" id="carsGrid"></div>
                <div class="stats-text" id="statsText">加载王牌数据...</div>
            </div>
            <div id="vehicleDetailArea" style="display: none;"></div>
        </div>

        <!-- 其他页面占位 -->
        <div id="chipPage" class="page"><div style="padding:40px; text-align:center;">🧩 芯片架构 · 即将完整展示</div></div>
        <div id="energyPage" class="page"><div style="padding:40px; text-align:center;">⚡ 赋能系统 · 开发中</div></div>
        <div id="calculatorPage" class="page"><div style="padding:40px; text-align:center;">📊 芯片要求计算器 敬请期待</div></div>
        <div id="newsPage" class="page"><div style="padding:40px; text-align:center;">🔥 最新爆料 即将到来</div></div>
        <div id="wallpaperPage" class="page"><div style="padding:20px;"><h2 style="color:#FFD966;">游戏壁纸</h2><div>✨ 精美壁纸准备中</div></div></div>
    </div>
</div>

<!-- 手机端固定头部 (独立于电脑端，只在手机显示) -->
<div class="mobile-fixed-header" id="mobileHeader">
    <div class="mobile-logo-area" onclick="location.reload()">
        <h1>王牌竞速·情报站</h1>
        <p>核心档案 · 赛车数据</p>
    </div>
    <div class="mobile-nav-tabs" id="mobileNavTabs">
        <button class="mobile-tab-btn active" data-page="vehicles">车辆数据</button>
        <button class="mobile-tab-btn" data-page="chip">芯片架构</button>
        <button class="mobile-tab-btn" data-page="energy">赋能系统</button>
        <button class="mobile-tab-btn" data-page="calculator">计算器</button>
        <button class="mobile-tab-btn" data-page="news">爆料</button>
        <button class="mobile-tab-btn" data-page="wallpaper">壁纸</button>
    </div>
    <!-- 手机端筛选栏：统一大小，彻底修复分类显示过大问题 -->
    <div class="mobile-filter-bar" id="mobileFilterBar">
        <div class="mobile-search-box">
            <input type="text" id="mobileSearchInput" placeholder="搜索车辆名称、简称、技能...">
        </div>
        <div class="mobile-filter-group">
            <span class="mobile-filter-label">分类</span>
            <div class="mobile-options" id="mobileCategoryOptions"></div>
        </div>
        <div class="mobile-filter-group">
            <span class="mobile-filter-label">专精</span>
            <div class="mobile-options" id="mobileSpecialtyOptions"></div>
        </div>
        <div class="mobile-filter-group">
            <span class="mobile-filter-label">品质</span>
            <div class="mobile-options" id="mobileQualityOptions"></div>
        </div>
    </div>
</div>

<script>
    // ==================== 车辆数据库 (基于原图分类/专精/品质) ====================
    const vehiclesData = [
        { id: "v1", name: "极光幻翼", category: "竞速", specialty: "城市", quality: "传说", image: "https://placehold.co/400x200?text=Aurora", description: "电磁驱动，爆发冲刺", acquisition: "限时奖池", acquisitionIcon: "https://placehold.co/60x60?text=G" },
        { id: "v2", name: "暗夜魅影", category: "干扰", specialty: "山路", quality: "传说", image: "https://placehold.co/400x200?text=Shadow", description: "暗影突袭，干扰掌控" },
        { id: "v3", name: "圣光天平", category: "天平", specialty: "场地", quality: "史诗", image: "https://placehold.co/400x200?text=Balance", description: "均衡力场，团队核心" },
        { id: "v4", name: "疾风猎手", category: "竞速", specialty: "场地", quality: "史诗", image: "https://placehold.co/400x200?text=Hunter", description: "极速突破" },
        { id: "v5", name: "机械守护", category: "辅助", specialty: "城市", quality: "稀有", image: "https://placehold.co/400x200?text=Guardian", description: "团队护盾续航" },
        { id: "v6", name: "雷鸣先锋", category: "干扰", specialty: "山路", quality: "稀有", image: "https://placehold.co/400x200?text=Thunder", description: "电磁区域控制" },
        { id: "v7", name: "原初之翼", category: "辅助", specialty: "场地", quality: "普通", image: "https://placehold.co/400x200?text=Origin", description: "能量回复支援" },
        { id: "v8", name: "赤焰战车", category: "竞速", specialty: "城市", quality: "普通", image: "https://placehold.co/400x200?text=Flame", description: "直线猛冲" }
    ];
    // 扩展数据让展示更丰富
    const extra = [
        { id: "v9", name: "电光石火", category: "竞速", specialty: "场地", quality: "史诗", image: "https://placehold.co/400x200?text=Spark", description: "闪电加速" },
        { id: "v10", name: "幻影迷雾", category: "干扰", specialty: "城市", quality: "稀有", image: "https://placehold.co/400x200?text=Mist", description: "致盲干扰" }
    ];
    const fullVehicles = [...vehiclesData, ...extra];
    // 为每个车辆补全必要字段
    fullVehicles.forEach(c => { if(!c.acquisitionIcon) c.acquisitionIcon = "https://placehold.co/60x60?text=A"; if(!c.acquisition) c.acquisition = "活动获取"; });

    // 全局状态
    let activeFilters = { category: "", specialty: "", quality: "" };
    let keyword = "";
    let isInDetail = false;
    let currentPage = "vehicles";
    let searchDebounceTimer = null;

    // 判断手机端
    function isMobile() { return window.innerWidth <= 768; }

    // ========== 通用渲染逻辑 ==========
    function filterVehicles() {
        let filtered = fullVehicles.filter(v => {
            if (activeFilters.category && v.category !== activeFilters.category) return false;
            if (activeFilters.specialty && v.specialty !== activeFilters.specialty) return false;
            if (activeFilters.quality && v.quality !== activeFilters.quality) return false;
            if (keyword && !v.name.toLowerCase().includes(keyword.toLowerCase()) && !(v.description && v.description.toLowerCase().includes(keyword.toLowerCase()))) return false;
            return true;
        });
        // 排序：传说>史诗>稀有>普通
        const qWeight = { "传说":4, "史诗":3, "稀有":2, "普通":1 };
        return filtered.sort((a,b) => (qWeight[b.quality]||0) - (qWeight[a.quality]||0));
    }

    function getQualityClass(quality) {
        if(quality === "传说") return "quality-legendary";
        if(quality === "史诗") return "quality-epic";
        if(quality === "稀有") return "quality-rare";
        return "quality-normal";
    }

    function renderVehicleList() {
        const filtered = filterVehicles();
        const grid = document.getElementById("carsGrid");
        const stats = document.getElementById("statsText");
        if (!grid) return;
        if (filtered.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:60px;">暂无车辆数据</div>';
            stats.innerText = "共 0 辆车";
            return;
        }
        grid.innerHTML = filtered.map(car => `
            <div class="car-card" data-id="${car.id}">
                <div class="card-image">
                    <img src="${car.image}" referrerpolicy="no-referrer" onerror="this.src='https://placehold.co/400x200?text=Car'">
                    <span class="quality-badge ${getQualityClass(car.quality)}">${car.quality}</span>
                </div>
                <div class="card-info">
                    <div class="car-name">${car.name}</div>
                    <div class="car-meta">
                        <span class="meta-item">🏷️ ${car.category}</span>
                        <span class="meta-item">📍 ${car.specialty}</span>
                    </div>
                    <div class="car-description">${car.description}</div>
                </div>
            </div>
        `).join("");
        stats.innerText = `共 ${filtered.length} 辆赛车`;
        // 绑定卡片点击事件
        document.querySelectorAll('.car-card').forEach(card => {
            card.removeEventListener('click', card._handler);
            card._handler = () => showVehicleDetail(card.dataset.id);
            card.addEventListener('click', card._handler);
        });
    }

    function showVehicleDetail(id) {
        const car = fullVehicles.find(v => v.id === id);
        if (!car) return;
        isInDetail = true;
        const listArea = document.getElementById("vehicleListArea");
        const detailArea = document.getElementById("vehicleDetailArea");
        listArea.style.display = "none";
        detailArea.style.display = "block";
        // 生成详情html (简易但完整)
        const detailHtml = `
            <div class="detail-container">
                <div style="padding:20px;"><button class="detail-back-btn" id="detailBackBtn">← 返回列表</button></div>
                <div class="detail-header">
                    <div class="detail-image"><img src="${car.image}" onerror="this.src='https://placehold.co/400x200?text=Car'"></div>
                    <div class="detail-info-panel">
                        <div class="detail-name">${car.name}</div>
                        <div class="car-meta"><span class="meta-item">${car.category}</span><span class="meta-item">${car.specialty}</span><span class="meta-item">${car.quality}</span></div>
                        <div class="info-row">获取方式: ${car.acquisition}</div>
                        <div class="car-description" style="margin-top:16px;">${car.description}</div>
                    </div>
                </div>
                <div class="features-section"><div class="section-title">车辆特点</div><div class="features-horizontal"><div class="feature-box">赛道适应性</div><div class="feature-box">极速强化</div></div></div>
                <div class="vehicle-stats"><div class="section-title">性能数据</div><div class="stats-grid"><div class="stat-card"><span>极速</span><span>825 km/h</span></div><div class="stat-card"><span>加速</span><span>9.2</span></div></div></div>
            </div>
        `;
        detailArea.innerHTML = detailHtml;
        document.getElementById("detailBackBtn")?.addEventListener("click", () => {
            isInDetail = false;
            listArea.style.display = "block";
            detailArea.style.display = "none";
            window.scrollTo(0,0);
            // 重新同步筛选栏状态（手机端显示筛选栏）
            if(isMobile()) document.getElementById("mobileFilterBar").style.display = "block";
            renderVehicleList();
        });
        window.scrollTo(0,0);
        // 详情页隐藏手机筛选栏
        if(isMobile()) document.getElementById("mobileFilterBar").style.display = "none";
    }

    // 初始化筛选器UI (电脑端和手机端分别独立渲染)
    function initFiltersUI() {
        // 电脑端筛选选项
        const categories = ["竞速", "辅助", "干扰", "天平"];
        const specialties = ["城市", "山路", "场地"];
        const qualities = ["传说", "史诗", "稀有", "普通"];
        const pcCategory = document.getElementById("pcCategoryOptions");
        const pcSpecialty = document.getElementById("pcSpecialtyOptions");
        const pcQuality = document.getElementById("pcQualityOptions");
        if(pcCategory) {
            pcCategory.innerHTML = categories.map(c => `<div class="pc-chip" data-filter="category" data-val="${c}">${c}</div>`).join("");
            pcSpecialty.innerHTML = specialties.map(s => `<div class="pc-chip" data-filter="specialty" data-val="${s}">${s}</div>`).join("");
            pcQuality.innerHTML = qualities.map(q => `<div class="pc-chip" data-filter="quality" data-val="${q}">${q}</div>`).join("");
            // 电脑端事件
            document.querySelectorAll("#pcCategoryOptions .pc-chip, #pcSpecialtyOptions .pc-chip, #pcQualityOptions .pc-chip").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const filter = btn.dataset.filter;
                    const val = btn.dataset.val;
                    if(activeFilters[filter] === val) activeFilters[filter] = "";
                    else activeFilters[filter] = val;
                    updatePcActiveUI();
                    renderVehicleList();
                });
            });
        }
        // 手机端筛选选项 (统一大小)
        const mobileCategory = document.getElementById("mobileCategoryOptions");
        const mobileSpecialty = document.getElementById("mobileSpecialtyOptions");
        const mobileQuality = document.getElementById("mobileQualityOptions");
        if(mobileCategory) {
            mobileCategory.innerHTML = categories.map(c => `<div class="mobile-chip" data-filter="category" data-val="${c}">${c}</div>`).join("");
            mobileSpecialty.innerHTML = specialties.map(s => `<div class="mobile-chip" data-filter="specialty" data-val="${s}">${s}</div>`).join("");
            mobileQuality.innerHTML = qualities.map(q => `<div class="mobile-chip" data-filter="quality" data-val="${q}">${q}</div>`).join("");
            document.querySelectorAll("#mobileCategoryOptions .mobile-chip, #mobileSpecialtyOptions .mobile-chip, #mobileQualityOptions .mobile-chip").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const filter = btn.dataset.filter;
                    const val = btn.dataset.val;
                    if(activeFilters[filter] === val) activeFilters[filter] = "";
                    else activeFilters[filter] = val;
                    updateMobileActiveUI();
                    renderVehicleList();
                });
            });
        }
        updatePcActiveUI();
        updateMobileActiveUI();
    }

    function updatePcActiveUI() {
        document.querySelectorAll("#pcCategoryOptions .pc-chip").forEach(btn => {
            if(btn.dataset.val === activeFilters.category) btn.classList.add("active");
            else btn.classList.remove("active");
        });
        document.querySelectorAll("#pcSpecialtyOptions .pc-chip").forEach(btn => {
            if(btn.dataset.val === activeFilters.specialty) btn.classList.add("active");
            else btn.classList.remove("active");
        });
        document.querySelectorAll("#pcQualityOptions .pc-chip").forEach(btn => {
            if(btn.dataset.val === activeFilters.quality) btn.classList.add("active");
            else btn.classList.remove("active");
        });
    }
    function updateMobileActiveUI() {
        document.querySelectorAll("#mobileCategoryOptions .mobile-chip").forEach(btn => {
            if(btn.dataset.val === activeFilters.category) btn.classList.add("active");
            else btn.classList.remove("active");
        });
        document.querySelectorAll("#mobileSpecialtyOptions .mobile-chip").forEach(btn => {
            if(btn.dataset.val === activeFilters.specialty) btn.classList.add("active");
            else btn.classList.remove("active");
        });
        document.querySelectorAll("#mobileQualityOptions .mobile-chip").forEach(btn => {
            if(btn.dataset.val === activeFilters.quality) btn.classList.add("active");
            else btn.classList.remove("active");
        });
    }

    function handleSearch(e) {
        if(searchDebounceTimer) clearTimeout(searchDebounceTimer);
        searchDebounceTimer = setTimeout(() => {
            keyword = e.target.value.trim();
            renderVehicleList();
        }, 300);
    }

    function attachSearchEvents() {
        const pcSearch = document.getElementById("pcSearchInput");
        const mobileSearch = document.getElementById("mobileSearchInput");
        if(pcSearch) pcSearch.addEventListener("input", handleSearch);
        if(mobileSearch) mobileSearch.addEventListener("input", handleSearch);
    }

    // 页面切换 (电脑端侧边栏 & 手机端导航)
    function switchToPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId + 'Page').classList.add('active-page');
        currentPage = pageId;
        // 同步手机端头部按钮高亮
        document.querySelectorAll('.mobile-tab-btn').forEach(btn => {
            if(btn.dataset.page === pageId) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        // 重新显示列表区域（如果从详情返回）
        if(pageId === 'vehicles') {
            const listArea = document.getElementById("vehicleListArea");
            const detailArea = document.getElementById("vehicleDetailArea");
            if(listArea && detailArea) {
                listArea.style.display = "block";
                detailArea.style.display = "none";
                isInDetail = false;
                if(isMobile()) document.getElementById("mobileFilterBar").style.display = "block";
                renderVehicleList();
            }
        }
        window.scrollTo(0,0);
    }

    function initTabs() {
        // 电脑侧边栏
        document.querySelectorAll('.sidebar .tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const page = btn.dataset.tab;
                switchToPage(page);
                document.querySelectorAll('.sidebar .tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
        // 手机端导航        document.querySelectorAll('.mobile-tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const page = btn.dataset.page;
                switchToPage(page);
                document.querySelectorAll('.sidebar .tab-btn').forEach(b => b.classList.remove('active'));
                if(page === 'vehicles') document.querySelector('.sidebar .tab-btn[data-tab="vehicles"]')?.classList.add('active');
                else if(page === 'chip') document.querySelector('.sidebar .tab-btn[data-tab="chip"]')?.classList.add('active');
                else if(page === 'energy') document.querySelector('.sidebar .tab-btn[data-tab="energy"]')?.classList.add('active');
            });
        });
    }

    // 重置筛选 (如果url携带参数等场景)
    function resetAndRender() {
        activeFilters = { category: "", specialty: "", quality: "" };
        keyword = "";
        if(isMobile()) {
            const mobileSearchInput = document.getElementById("mobileSearchInput");
            if(mobileSearchInput) mobileSearchInput.value = "";
            updateMobileActiveUI();
        } else {
            const pcSearchInput = document.getElementById("pcSearchInput");
            if(pcSearchInput) pcSearchInput.value = "";
            updatePcActiveUI();
        }
        renderVehicleList();
    }

    // 启动所有
    function init() {
        initFiltersUI();
        attachSearchEvents();
        initTabs();
        renderVehicleList();
        // 响应式监听resize，如果屏幕翻转重新确保UI高亮
        window.addEventListener('resize', () => {
            if(!isInDetail) renderVehicleList();
        });
    }
    init();
</script>
</body>
</html>
